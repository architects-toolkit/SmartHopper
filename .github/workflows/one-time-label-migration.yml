name: 🏷️ One-time Label Migration

# Description: Renames legacy labels and updates colors/descriptions for all
# existing labels. Run this ONCE after merging the label color rework PR,
# then delete this workflow file.
#
# What it does:
#   1. Renames 'stale' → 'status: stale'
#   2. Renames 'needs-attention' → 'status: needs-attention'
#   3. Updates colors and descriptions for all existing labels to match labels.yml
#   4. Updates 'provider: Gemini' color and description (not in labels.yml)
#   5. Updates existing version labels to white (FFFFFF)
#
# After running successfully, delete this file from the repository.

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  migrate-labels:
    name: Rename and update labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // --- Step 1: Rename labels ---
            const renames = [
              { old: 'stale', new: 'status: stale', color: 'CFD3D7', description: 'Issue or PR has been inactive and may be closed soon' },
              { old: 'needs-attention', new: 'status: needs-attention', color: 'FF6723', description: 'Requires manual review or intervention' },
            ];

            for (const r of renames) {
              try {
                await github.rest.issues.updateLabel({
                  owner, repo,
                  name: r.old,
                  new_name: r.new,
                  color: r.color,
                  description: r.description,
                });
                console.log(`✅ Renamed '${r.old}' → '${r.new}'`);
              } catch (e) {
                if (e.status === 404) {
                  console.log(`⚠️ Label '${r.old}' not found — may already be renamed`);
                } else {
                  console.error(`❌ Failed to rename '${r.old}': ${e.message}`);
                }
              }
            }

            // --- Step 2: Update colors and descriptions for existing labels ---
            const updates = [
              // Automation
              { name: 'automated', color: 'BFD4DB', description: 'Automatically generated by CI/CD workflows' },
              { name: 'ci', color: 'BFD4DB', description: 'Changes to CI/CD workflows or actions' },
              { name: 'model-verification', color: '2EA44F', description: 'Model verification workflow' },
              { name: 'documentation', color: '0075CA', description: 'Documentation changes' },
              { name: 'has-conflicts', color: 'E4E669', description: 'Cherry-pick had merge conflicts' },
              // Priority
              { name: 'priority: critical', color: 'B60205', description: 'Critical priority issue that needs immediate attention' },
              { name: 'priority: high', color: 'D93F0B', description: 'High priority issue that should be addressed soon' },
              { name: 'priority: medium', color: 'E4A511', description: 'Medium priority issue' },
              { name: 'priority: low', color: '0075CA', description: 'Low priority issue' },
              // Close
              { name: 'close: duplicate', color: '808080', description: 'This issue already exists' },
              { name: 'close: not related', color: '808080', description: 'This issue is not related to the SmartHopper plugin' },
              { name: 'close: lack of details', color: '808080', description: 'This issue is missing details' },
              { name: 'close: help not found', color: '808080', description: 'This issue is missing help' },
              // Status
              { name: 'status: in progress', color: 'FBCA04', description: 'Issue is currently being worked on' },
              { name: 'status: blocked', color: 'D92D20', description: 'Issue is blocked by other work' },
              { name: 'status: needs more details', color: 'A855F7', description: 'Requires more details to proceed' },
              { name: 'status: needs triage', color: '0E8A16', description: 'Ready for triage' },
              { name: 'status: help wanted', color: '14B8A6', description: 'Help wanted' },
              // Promotion
              { name: 'promotion: blocked', color: 'E11D48', description: 'Promotion is blocked and requires manual intervention' },
              { name: 'promotion: freeze', color: 'F97316', description: 'Pauses automatic promotion for a version' },
              // Components (all dark navy)
              ...['GhGet', 'GhPut', 'GhRetrieveComponents', 'GhTidyUp',
                  'AI GhGenerate', 'AI GhConnect', 'AI TextEvaluate', 'AI TextGenerate',
                  'AI TextListGenerate', 'AI ImgGenerate', 'AI ScriptReview', 'AI ScriptGenerator',
                  'AI ListEvaluate', 'AI ListFilter', 'AI ListGenerate', 'AI GroupTitle',
                  'AI File Context', 'AI Models', 'AI Chat', 'AI Chat Input', 'AI Chat Output',
                  'AI Context', 'Context Parameters', 'Deconstruct Metrics',
                  'SaveGhJSON', 'LoadGhJSON', 'ImageViewer',
              ].map(c => ({ name: `component: ${c}`, color: '1B2638' })),
              // Providers (all dark teal) — Gemini handled separately
              ...['MistralAI', 'OpenAI', 'DeepSeek', 'OpenRouter', 'Anthropic']
                .map(p => ({ name: `provider: ${p}`, color: '1A3636' })),
              // Scope (all black except Security)
              ...['Settings', 'AI Tools', 'AI Calls', 'Provider Manager', 'Context Manager',
                  'Model Manager', 'Tool Manager', 'UI', 'Toolbar menu', 'Component Base',
                  'Conversation Session', 'Canvas Assistant']
                .map(s => ({ name: `scope: ${s}`, color: '000000' })),
              { name: 'scope: Security', color: '550000', description: 'Issues related to Authenticode, SHA256, etc.' },
              // OS (all dark slate)
              { name: 'os: Windows', color: '2B3A52', description: 'Issues related to the Windows plugin' },
              { name: 'os: MacOS', color: '2B3A52', description: 'Issues related to the MacOS plugin' },
              // Provider: Gemini (NOT in labels.yml, update on GitHub only)
              { name: 'provider: Gemini', color: '1A3636', description: 'Issues related to the Gemini provider (planned for v2.0.0)' },
            ];

            for (const label of updates) {
              try {
                const params = { owner, repo, name: label.name, color: label.color };
                if (label.description) params.description = label.description;
                await github.rest.issues.updateLabel(params);
                console.log(`✅ Updated '${label.name}'`);
              } catch (e) {
                if (e.status === 404) {
                  console.log(`⚠️ Label '${label.name}' not found — skipping`);
                } else {
                  console.error(`❌ Failed to update '${label.name}': ${e.message}`);
                }
              }
            }

            // --- Step 3: Update existing version labels to white ---
            const allLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner, repo, per_page: 100,
            });
            const versionLabels = allLabels.filter(l => l.name.startsWith('version:'));
            for (const label of versionLabels) {
              try {
                await github.rest.issues.updateLabel({
                  owner, repo,
                  name: label.name,
                  color: 'FFFFFF',
                });
                console.log(`✅ Updated version label '${label.name}' to white`);
              } catch (e) {
                console.error(`❌ Failed to update '${label.name}': ${e.message}`);
              }
            }

            console.log('\n🎉 Label migration complete! Delete this workflow file now.');
