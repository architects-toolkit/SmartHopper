name: 📋 Milestone Management

# Milestone Management Workflow
# 1. Creates next-stage milestones when versions are released:
#    - alpha → beta + next minor alpha
#    - beta → rc
#    - rc → stable
# 2. Keeps only the latest beta, rc, and stable milestones active (closes older ones)
# 3. Moves open issues from closed milestones to the next alpha version
# 4. Allows unlimited alpha milestones

on:
  milestone:
    types: [closed]
  release:
    types: [published]

permissions:
  issues: write
  pull-requests: write
  contents: read

concurrency:
  group: milestone-mgmt-${{ github.event.milestone.number || github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

jobs:
  create-next-stage-milestone:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Create next-stage milestones
      uses: ./.github/actions/versioning/manage-milestones
      with:
        released-version: ${{ github.event.release.tag_name }}
        token: ${{ secrets.GITHUB_TOKEN }}

  move-open-items:
    if: github.event_name == 'milestone'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Move open issues and PRs to next milestone
      uses: ./.github/actions/versioning/move-milestone-items
      with:
        closed-milestone-title: ${{ github.event.milestone.title }}
        token: ${{ secrets.GITHUB_TOKEN }}
