name: 🍒 Patch Propagate (Multi-Branch)

# Description: Manually fan-out one or more commits onto multiple target branches by
# opening a PR per target. Never pushes directly to protected branches.
#
# Use cases:
# - Apply an AI provider model list update to dev, main-1.4, dev-1.5, etc.
# - Backport a small fix to several long-lived branches.
# - Propagate CI/docs tweaks across release lines.

on:
  workflow_dispatch:
    inputs:
      source-shas:
        description: 'Commit SHA(s) to cherry-pick. Comma- or space-separated, in chronological order.'
        required: true
        type: string
      source-branch:
        description: 'Source branch (informational, shown in PR body).'
        required: false
        type: string
        default: 'dev'
      target-branches:
        description: 'Comma-separated list of target branches (e.g., main,dev,main-1.4,dev-1.5).'
        required: false
        type: string
        default: ''
      auto-discover:
        description: 'Automatically discover all dev and dev-* branches as targets (overrides target-branches).'
        required: false
        type: boolean
        default: false
      include-main-branches:
        description: 'When auto-discover is true, also include main-* branches (for critical fixes only).'
        required: false
        type: boolean
        default: false
      exclude-branches:
        description: 'Comma-separated branches to exclude from auto-discovery.'
        required: false
        type: string
        default: ''
      pr-title-prefix:
        description: 'Prefix for each PR title.'
        required: false
        type: string
        default: '[patch]'
      pr-body-extra:
        description: 'Optional extra markdown appended to each PR body.'
        required: false
        type: string
        default: ''
      labels:
        description: 'Comma-separated labels to apply to each PR. Missing labels are skipped (not auto-created).'
        required: false
        type: string
        default: ''
      draft-always:
        description: 'Force every PR to be opened as draft.'
        required: false
        type: boolean
        default: false
      mainline:
        description: 'For merge commits, parent number passed to git cherry-pick -m (e.g., 1). Leave empty for normal commits.'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ inputs.auto-discover == true && steps.discover.outputs.targets || steps.split.outputs.targets }}
      has-targets: ${{ inputs.auto-discover == true && (steps.discover.outputs.count != '0') || steps.split.outputs.has-targets == 'true' }}
    steps:
      - name: Discover branches
        if: inputs.auto-discover == true
        id: discover
        uses: actions/github-script@v7
        with:
          script: |
            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            let targets = branches
              .map(b => b.name)
              .filter(n => n === 'dev' || n.startsWith('dev-'));
            if ('${{ inputs.include-main-branches }}' === 'true') {
              const mainBranches = branches
                .map(b => b.name)
                .filter(n => n.startsWith('main-'));
              targets = targets.concat(mainBranches);
            }
            // Exclude specified branches
            const excludeRaw = '${{ inputs.exclude-branches }}';
            if (excludeRaw) {
              const excludeSet = new Set(excludeRaw.split(',').map(b => b.trim()).filter(Boolean));
              targets = targets.filter(t => !excludeSet.has(t));
            }
            // Exclude the source branch to avoid self-cherry-pick
            const source = '${{ inputs.source-branch }}';
            targets = targets.filter(t => t !== source);
            core.setOutput('targets', JSON.stringify(targets));
            core.setOutput('count', targets.length.toString());
            console.log(`Discovered ${targets.length} target branch(es): ${JSON.stringify(targets)}`);

      - name: Split target list
        if: inputs.auto-discover != true
        id: split
        shell: bash
        run: |
          set -euo pipefail
          raw='${{ inputs.target-branches }}'
          # Build JSON array of trimmed, non-empty targets.
          json=$(echo "$raw" \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' \
            | awk 'NF' \
            | jq -R . | jq -sc .)
          count=$(echo "$json" | jq 'length')
          echo "targets=$json" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "has-targets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-targets=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved $count target branch(es): $json"

  propagate:
    needs: resolve
    if: needs.resolve.outputs.has-targets == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: "patch-${{ matrix.target }}"
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.resolve.outputs.targets) }}
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cherry-pick to ${{ matrix.target }}
        id: cp
        uses: ./.github/actions/cherry-pick-to-branch
        with:
          source-shas: ${{ inputs.source-shas }}
          source-branch: ${{ inputs.source-branch }}
          target-branch: ${{ matrix.target }}
          pr-title-prefix: ${{ inputs.pr-title-prefix }}
          pr-body-extra: ${{ inputs.pr-body-extra }}
          labels: ${{ inputs.labels }}
          draft-always: ${{ inputs.draft-always }}
          mainline: ${{ inputs.mainline }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Per-target summary
        if: always()
        shell: bash
        run: |
          {
            echo "### 🍒 Patch → `${{ matrix.target }}`"
            echo ""
            echo "- **Status:** ${{ steps.cp.outputs.status || 'failed' }}"
            echo "- **Branch:** `${{ steps.cp.outputs.branch-name }}`"
            echo "- **Conflicts:** ${{ steps.cp.outputs.has-conflicts || 'n/a' }}"
            if [ -n "${{ steps.cp.outputs.pr-url }}" ]; then
              echo "- **PR:** [#${{ steps.cp.outputs.pr-number }}](${{ steps.cp.outputs.pr-url }})"
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on unresolved conflicts
        if: steps.cp.outputs.has-conflicts == 'true'
        shell: bash
        run: |
          echo "::error::Cherry-pick to ${{ matrix.target }} had conflicts. PR created with conflict markers for manual resolution."
          exit 1

  summary:
    needs: [resolve, propagate]
    if: always() && needs.resolve.outputs.has-targets == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results and notify on failure
        uses: actions/github-script@v7
        with:
          script: |
            const propagateResult = '${{ needs.propagate.result }}';
            const shas = '${{ inputs.source-shas }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            if (propagateResult === 'failure') {
              // Create issue for manual attention
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `\ud83c\udf52 Patch propagate needs attention (run #${context.runNumber})`,
                body: `One or more cherry-picks had conflicts or failures.\n\n` +
                      `**Run:** [#${context.runNumber}](${runUrl})\n` +
                      `**SHAs:** \`${shas}\`\n` +
                      `**Source branch:** \`${{ inputs.source-branch }}\`\n\n` +
                      `Please review the workflow run and resolve any draft PRs with conflict markers.`,
                labels: ['automation', 'needs-attention']
              });
              console.log('Created needs-attention issue for failed propagation');
            } else {
              console.log(`Propagation result: ${propagateResult} — no issue needed`);
            }
