name: 🍒 Patch Propagate (Multi-Branch)

# Description: Manually fan-out one or more commits onto multiple target branches by
# opening a PR per target. Never pushes directly to protected branches.
#
# Use cases:
# - Apply an AI provider model list update to dev, main-1.4, dev-1.5, etc.
# - Backport a small fix to several long-lived branches.
# - Propagate CI/docs tweaks across release lines.

on:
  workflow_dispatch:
    inputs:
      source-shas:
        description: 'Commit SHA(s) to cherry-pick. Comma- or space-separated, in chronological order.'
        required: true
        type: string
      source-branch:
        description: 'Source branch (informational, shown in PR body).'
        required: false
        type: string
        default: 'dev'
      target-branches:
        description: 'Comma-separated list of target branches (e.g., main,dev,main-1.4,dev-1.5).'
        required: true
        type: string
      pr-title-prefix:
        description: 'Prefix for each PR title.'
        required: false
        type: string
        default: '[patch]'
      pr-body-extra:
        description: 'Optional extra markdown appended to each PR body.'
        required: false
        type: string
        default: ''
      labels:
        description: 'Comma-separated labels to apply to each PR.'
        required: false
        type: string
        default: 'patch,automated'
      draft-always:
        description: 'Force every PR to be opened as draft.'
        required: false
        type: boolean
        default: false
      mainline:
        description: 'For merge commits, parent number passed to git cherry-pick -m (e.g., 1). Leave empty for normal commits.'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.split.outputs.targets }}
      has-targets: ${{ steps.split.outputs.has-targets }}
    steps:
      - name: Split target list
        id: split
        shell: bash
        run: |
          set -euo pipefail
          raw='${{ inputs.target-branches }}'
          # Build JSON array of trimmed, non-empty targets.
          json=$(echo "$raw" \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' \
            | grep -v '^$' \
            | jq -R . | jq -sc .)
          count=$(echo "$json" | jq 'length')
          echo "targets=$json" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "has-targets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-targets=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved $count target branch(es): $json"

  propagate:
    needs: resolve
    if: needs.resolve.outputs.has-targets == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.resolve.outputs.targets) }}
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cherry-pick to ${{ matrix.target }}
        id: cp
        uses: ./.github/actions/cherry-pick-to-branch
        with:
          source-shas: ${{ inputs.source-shas }}
          source-branch: ${{ inputs.source-branch }}
          target-branch: ${{ matrix.target }}
          pr-title-prefix: ${{ inputs.pr-title-prefix }}
          pr-body-extra: ${{ inputs.pr-body-extra }}
          labels: ${{ inputs.labels }}
          draft-always: ${{ inputs.draft-always }}
          mainline: ${{ inputs.mainline }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Per-target summary
        if: always()
        shell: bash
        run: |
          {
            echo "### 🍒 Patch → \`${{ matrix.target }}\`"
            echo ""
            echo "- **Status:** ${{ steps.cp.outputs.status || 'failed' }}"
            echo "- **Branch:** \`${{ steps.cp.outputs.branch-name }}\`"
            echo "- **Conflicts:** ${{ steps.cp.outputs.has-conflicts || 'n/a' }}"
            if [ -n "${{ steps.cp.outputs.pr-url }}" ]; then
              echo "- **PR:** [#${{ steps.cp.outputs.pr-number }}](${{ steps.cp.outputs.pr-url }})"
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
