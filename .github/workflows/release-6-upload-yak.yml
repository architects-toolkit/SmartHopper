name: 🚀 6 Upload to Yak Rhino Server

# Related workflows (release pipeline — execute in numbered order):
#   - release-1-milestone.yml (creates milestone and branches)
#   - release-2-pr-to-dev-closed.yml (creates PR from dev→main on release merge)
#   - release-3-pr-to-main-closed.yml (creates GitHub Release on main merge)
#   - release-4-build.yml (builds platform artifacts on release publish)
#   - release-5-deploy-pages.yml (deploys documentation pages)
#   - release-6-upload-yak.yml (uploads to Yak package manager)

# Description: This workflow uploads the release artifacts to the Yak Rhino Server.
# It must be triggered manually after the release is built.
#
# Prerequisites:
# - A YAK_AUTH_TOKEN secret must be configured in your repository settings
#   To obtain a token:
#   1. Install the Yak CLI: https://developer.rhino3d.com/guides/yak/yak-cli-reference/
#   2. Run: yak login --ci
#   3. Add the displayed token as a repository secret named YAK_AUTH_TOKEN
#
# Triggers:
# - Manually via workflow_dispatch
#
# Permissions:
# - contents:read - Required to read repository content for building
# - contents:write - Required to upload assets to releases (only when triggered by release)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to upload (leave empty to use version from main branch)'
        required: false
        type: string
        default: ''
      platform:
        description: 'Platform(s) to upload to Yak'
        required: true
        type: choice
        options:
          - windows
          - macos
          - both
        default: 'both'
      upload_to_yak:
        description: 'Confirm upload to Yak?'
        required: false
        type: boolean
        default: false
      testing:
        description: 'Just testing?'
        required: false
        type: boolean
        default: true

jobs:
  upload-to-yak:
    name: Upload to Yak
    runs-on: windows-latest
    timeout-minutes: 45

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from branch
        id: get_version_from_branch
        if: inputs.version == ''
        uses: ./.github/actions/versioning/get-version
        with:
          branch: main

      - name: Set version
        id: get_version
        shell: pwsh
        run: |
          if ("${{ inputs.version }}" -ne "") {
            $version = "${{ inputs.version }}"
            Write-Host "Using manually specified version: $version"
          } else {
            $version = "${{ steps.get_version_from_branch.outputs.version }}"
            Write-Host "Using version from main branch: $version"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Update manifest text for version
        uses: ./.github/actions/versioning/update-manifest-text
        with:
          version: ${{ steps.get_version.outputs.version }}
          update-file: 'true'

      - name: Create version label if doesn't exist
        if: inputs.upload_to_yak == 'true'
        uses: ./.github/actions/versioning/create-version-label
        with:
          version: ${{ steps.get_version.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create artifacts directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
        
      - name: Download Windows release asset
        if: inputs.platform == 'windows' || inputs.platform == 'both'
        uses: robinraju/release-downloader@v1
        with:
          repository: ${{ github.repository }}
          tag: ${{ steps.get_version.outputs.version }}
          fileName: "SmartHopper-${{ steps.get_version.outputs.version }}-Rhino8-Windows.zip"
          out-file-path: "artifacts"
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Download Mac release asset
        if: inputs.platform == 'macos' || inputs.platform == 'both'
        uses: robinraju/release-downloader@v1
        with:
          repository: ${{ github.repository }}
          tag: ${{ steps.get_version.outputs.version }}
          fileName: "SmartHopper-${{ steps.get_version.outputs.version }}-Rhino8-Mac.zip"
          out-file-path: "artifacts"
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Verify downloaded assets
        shell: pwsh
        run: |
          $windowsFile = "artifacts/SmartHopper-${{ steps.get_version.outputs.version }}-Rhino8-Windows.zip"
          $macFile = "artifacts/SmartHopper-${{ steps.get_version.outputs.version }}-Rhino8-Mac.zip"
          
          if ("${{ inputs.platform }}" -eq 'windows' -or "${{ inputs.platform }}" -eq 'both') {
            if (-not (Test-Path $windowsFile)) {
              Write-Host "::error::Windows asset not found after download: $windowsFile"
              exit 1
            }
            Write-Host "Windows asset verified: $windowsFile"
          }
          
          if ("${{ inputs.platform }}" -eq 'macos' -or "${{ inputs.platform }}" -eq 'both') {
            if (-not (Test-Path $macFile)) {
              Write-Host "::error::Mac asset not found after download: $macFile"
              exit 1
            }
            Write-Host "Mac asset verified: $macFile"
          }
          
          Write-Host "Assets downloaded successfully"
          
          # Rename files to make them easier to reference in Yak commands
          if (Test-Path $windowsFile) {
            Move-Item -Path $windowsFile -Destination "artifacts/windows.zip" -Force
          }
          if (Test-Path $macFile) {
            Move-Item -Path $macFile -Destination "artifacts/mac.zip" -Force
          }

      - name: Download Yak CLI
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "http://files.mcneel.com/yak/tools/latest/yak.exe" -OutFile "yak.exe"
          Write-Host "Downloaded Yak CLI"

      - name: Build Windows Yak package
        id: build_windows
        if: inputs.platform == 'windows' || inputs.platform == 'both'
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $pkgDir = "yak-windows"
          Remove-Item $pkgDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $pkgDir
          Expand-Archive -Path "artifacts/windows.zip" -DestinationPath $pkgDir -Force
          Copy-Item -Path "yak-package\*" -Destination $pkgDir -Recurse -Force
          # Inject actual version into manifest
          (Get-Content "$pkgDir/manifest.yml") -replace '{{VERSION}}', $version | Set-Content "$pkgDir/manifest.yml"

          Push-Location $pkgDir
          ../yak.exe build --platform win
          $zip = Get-ChildItem -Filter "*.yak" | Select-Object -ExpandProperty FullName
          echo "windows_yak_package=$zip" >> $env:GITHUB_OUTPUT
          Pop-Location

      - name: Upload Windows Yak package artifact
        if: inputs.platform == 'windows' || inputs.platform == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: windows-yak-package
          path: yak-windows/*.yak

      - name: Build macOS Yak package
        id: build_macos
        if: inputs.platform == 'macos' || inputs.platform == 'both'
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $pkgDir = "yak-macos"
          Remove-Item $pkgDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $pkgDir
          Expand-Archive -Path "artifacts/mac.zip" -DestinationPath $pkgDir -Force
          Copy-Item -Path "yak-package\*" -Destination $pkgDir -Recurse -Force
          # Inject actual version into manifest
          (Get-Content "$pkgDir/manifest.yml") -replace '{{VERSION}}', $version | Set-Content "$pkgDir/manifest.yml"

          Push-Location $pkgDir
          ../yak.exe build --platform mac
          $zip = Get-ChildItem -Filter "*.yak" | Select-Object -ExpandProperty FullName
          echo "macos_yak_package=$zip" >> $env:GITHUB_OUTPUT
          Pop-Location

      - name: Upload macOS Yak package artifact
        if: inputs.platform == 'macos' || inputs.platform == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: macos-yak-package
          path: yak-macos/*.yak

      - name: Upload Windows Yak package to Yak
        if: (inputs.platform == 'windows' || inputs.platform == 'both') && inputs.upload_to_yak
        shell: pwsh
        run: |
          $FilePath = "${{ steps.build_windows.outputs.windows_yak_package }}"
          if (-not (Test-Path $FilePath)) {
              Write-Host "::error::Yak package not found at: $FilePath"
              exit 1
          }
          $sourceFlag = ""
          if ("${{ inputs.testing }}" -eq "true") {
              $sourceFlag = "--source https://test.yak.rhino3d.com"
              Write-Host "Uploading to test Yak server"
          } else {
              Write-Host "Uploading to production Yak server"
          }
          Write-Host "Uploading Windows Yak package: $FilePath"
          Write-Host "File exists: $(Test-Path $FilePath)"
          Write-Host "File size: $(if (Test-Path $FilePath) { (Get-Item $FilePath).Length } else { 'N/A' }) bytes"

          $exe  = Join-Path $PWD 'yak.exe'
          $args = @('push')
          if ($sourceFlag) { $args += $sourceFlag.Split(' ') }
          $args += $FilePath

          Write-Host "Running: $exe $($args -join ' ')"
          & $exe @args

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Failed to upload Windows Yak package"
            exit 1
          } else {
            Write-Host "Successfully uploaded Windows Yak package"
          }
        env:
          YAK_TOKEN: ${{ secrets.YAK_AUTH_TOKEN }}

      - name: Upload macOS Yak package to Yak
        if: (inputs.platform == 'macos' || inputs.platform == 'both') && inputs.upload_to_yak
        shell: pwsh
        run: |
          $FilePath = "${{ steps.build_macos.outputs.macos_yak_package }}"
          if (-not (Test-Path $FilePath)) {
              Write-Host "::error::Yak package not found at: $FilePath"
              exit 1
          }
          $sourceFlag = ""
          if ("${{ inputs.testing }}" -eq "true") {
              $sourceFlag = "--source https://test.yak.rhino3d.com"
              Write-Host "Uploading to test Yak server"
          } else {
              Write-Host "Uploading to production Yak server"
          }
          Write-Host "Uploading macOS Yak package: $FilePath"
          Write-Host "File exists: $(Test-Path $FilePath)"
          Write-Host "File size: $(if (Test-Path $FilePath) { (Get-Item $FilePath).Length } else { 'N/A' }) bytes"

          $exe  = Join-Path $PWD 'yak.exe'
          $args = @('push')
          if ($sourceFlag) { $args += $sourceFlag.Split(' ') }
          $args += $FilePath

          Write-Host "Running: $exe $($args -join ' ')"
          & $exe @args

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Failed to upload macOS Yak package"
            exit 1
          } else {
            Write-Host "Successfully uploaded macOS Yak package"
          }
        env:
          YAK_TOKEN: ${{ secrets.YAK_AUTH_TOKEN }}

      # Note: Yak supports multiple distributions per version. Uploading Windows and macOS
      # separately (or at different times) is fully supported. Both packages will appear
      # as distributions under the same version on the Yak server (e.g., smarthopper-1.0.0-rh8-win.yak
      # and smarthopper-1.0.0-rh8-mac.yak). Users on each platform will automatically receive
      # the correct distribution when installing via the Package Manager.
