name: 🧪 .NET CI

# Related workflows (PR validation suite):
#   - pr-validation.yml (version, code style, changelog, title checks)
#   - pr-license-headers.yml (license header compliance)
#   - pr-build-hash-validation.yml (build hash integrity)
#   - pr-version-validation.yml (version consistency)
#   - pr-documentation-validation.yml (documentation structure validation)
#   (pr-manifest-validation.yml was removed — manifest text uses {{NOTE_TEXT}} placeholder resolved at build time)
#   - ci-dotnet-tests.yml (.NET build and test)

# Description: This workflow runs .NET tests on the SmartHopper solution to ensure that changes do not break functionality.
# 
# Flow:
# 1. Prep job runs on Windows to execute Windows-only operations (Update InternalsVisibleTo, SNK generation)
# 2. Build job runs on both Windows and macOS using matrix strategy, downloading pre-processed source from prep job
# 
# Triggers:
# - push to main branch
# - pull_request targeting main, dev and release branches
# 
# Permissions:
# - contents: read - Required to read repository content
# - pull-requests: read - Required to read pull request information

on:
  push:
    branches:
      - main
      - 'main-*'
  pull_request:
    branches:
      - main
      - dev
      - 'main-*'
      - 'dev-*'
      - hotfix/**
      - release/**
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to validate.
        required: false
        type: string
      base_ref:
        description: Pull request base branch.
        required: false
        type: string
      pr_title:
        description: Pull request title.
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Windows-only prep step - generates SNK, updates InternalsVisibleTo in csproj files
  # This ensures the public key is embedded in source files before cross-platform compilation
  prep:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Decode strong-name key
        shell: pwsh
        run: |
          if (-not (Test-Path signing.snk)) {
            if ("${{ secrets.SIGNING_SNK_BASE64 }}" -ne "") {
              Write-Host "Decoding signing.snk from Base64 secret"
              & tools/Sign-StrongNames.ps1 -Base64 "${{ secrets.SIGNING_SNK_BASE64 }}"
            } else {
              Write-Host "Generating signing.snk"
              & tools/Sign-StrongNames.ps1 -Generate
            }
          } else {
            Write-Host "signing.snk already exists"
          }

      - name: Update InternalsVisibleTo with public key
        shell: pwsh
        run: |
          Write-Host "Updating InternalsVisibleTo entries with public key from signing.snk"
          & tools/Update-InternalsVisibleTo.ps1

      - name: Upload pre-processed source
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-source
          path: |
            src/**/*.csproj
            signing.snk
          retention-days: 1

  # Job 2: Build and test on both Windows and macOS
  # Uses pre-processed source from prep job (includes updated InternalsVisibleTo)
  build:
    needs: prep
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download pre-processed source
        uses: actions/download-artifact@v4
        with:
          name: preprocessed-source

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Determine version
        id: determine_version
        uses: ./.github/actions/versioning/get-version

      - name: Dotnet Build
        uses: ./.github/actions/dotnet-build
        with:
          solution: SmartHopper.sln
          configuration: Release
          signing_snk_base64: ${{ secrets.SIGNING_SNK_BASE64 }}
          libs_repo_pat: ${{ secrets.LIBS_REPO_PAT }}
          signing_pfx_base64: ${{ secrets.SIGNING_PFX_BASE64 }}
          signing_pfx_password: ${{ secrets.SIGNING_PFX_PASSWORD }}
          version: ${{ steps.determine_version.outputs.version }}
          skip_internals_visible_to: true

      - name: Run all tests (Windows)
        if: runner.os == 'Windows'
        run: dotnet test --no-build --configuration Release --results-directory TestResults

      - name: Run all tests (macOS - Infrastructure.Tests only)
        if: runner.os == 'macOS'
        run: |
          # Run only SmartHopper.Infrastructure.Tests on Mac: it is the only test project
          # with a true net7.0 (non-Windows) target. Core.Tests and Core.Grasshopper.Tests
          # depend on WindowsDesktop/WinForms APIs that are not available on macOS net7.0.
          dotnet test src/SmartHopper.Infrastructure.Tests/SmartHopper.Infrastructure.Tests.csproj --no-build --configuration Release --framework net7.0 --results-directory TestResults --verbosity normal

  required-check:
    name: 🧪 .NET CI
    needs: [prep, build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Verify required workflow jobs
        shell: bash
        run: |
          if [[ "${{ needs.prep.result }}" != "success" ]]; then
            echo "::error::Prep finished with ${{ needs.prep.result }}"
            exit 1
          fi

          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::Build/test matrix finished with ${{ needs.build.result }}"
            exit 1
          fi
