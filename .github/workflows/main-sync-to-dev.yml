name: 🔁 Sync main to dev branches

# Description: On changes to the `main` branch, automatically open (or reuse)
# a PR from `main` into the `dev` branch and, for every `dev-*` stabilization
# branch, a PR with only the allow-listed files cherry-picked from `main`.
#
# Rationale:
# - `dev`: always kept in sync with `main` — direct PR from `main`.
# - `dev-*` (stabilization branches): frozen release lines. Must NOT receive
#   new features. The workflow creates/maintains a sync branch
#   `sync/main-to-<dev-*>` that mirrors only the allow-listed files from
#   `main` onto the stabilization branch, and opens a PR from that sync
#   branch into `<dev-*>`. Non-allow-listed files (e.g., feature source,
#   docs, CHANGELOG) stay on `main` and are never propagated.
#
#   Allow-list for `dev-*`:
#     * any change (add/modify/rename/delete) under `.github/`, `.windsurf/`,
#       `.githooks/`, or `hashes/` (CI, rules, git hooks, provider hashes);
#     * *modifications* (not add/rename/delete) to existing
#       `src/SmartHopper.Providers.*/*ProviderModels.cs` files, so model
#       verification flips, deprecations, and model-list updates propagate.
#
# Behavior per target:
# - Skips if there is no effective diff (or, for `dev-*`, no allow-listed diff).
# - Reuses an existing open PR when present; otherwise creates a new one.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.discover.outputs.targets }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - name: Discover dev and dev-* branches
        id: discover
        uses: actions/github-script@v7
        with:
          script: |
            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const targets = branches
              .map(b => b.name)
              .filter(n => n === 'dev' || n.startsWith('dev-'));
            core.setOutput('targets', JSON.stringify(targets));
            core.setOutput('count', targets.length.toString());
            console.log(`Discovered ${targets.length} target branch(es): ${JSON.stringify(targets)}`);

  sync:
    needs: discover
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover.outputs.targets) }}
    concurrency:
      group: "main-sync-${{ matrix.target }}"
      cancel-in-progress: false
    steps:
      - name: Compute sync plan for ${{ matrix.target }}
        id: plan
        uses: actions/github-script@v7
        with:
          script: |
            const base = '${{ matrix.target }}';
            const head = 'main';
            const { owner, repo } = context.repo;

            // For `dev-*` (stabilization) branches, restrict to infra-only paths
            // plus modifications to existing provider model registries.
            const isStabilization = base !== 'dev' && base.startsWith('dev-');
            const ALLOWED_PREFIXES = ['.github/', '.windsurf/', '.githooks/', 'hashes/'];
            // Matches: src/SmartHopper.Providers.<Provider>/<Provider>ProviderModels.cs
            const PROVIDER_MODELS_RE = /^src\/SmartHopper\.Providers\.[^/]+\/[^/]*ProviderModels\.cs$/;
            const isAllowedStabilizationFile = (file) => {
              const p = file.filename;
              if (ALLOWED_PREFIXES.some(prefix => p.startsWith(prefix))) return true;
              if (PROVIDER_MODELS_RE.test(p) && file.status === 'modified') return true;
              return false;
            };

            // Paginate full file list across the compare.
            const files = await github.paginate(
              github.rest.repos.compareCommitsWithBasehead,
              { owner, repo, basehead: `${base}...${head}`, per_page: 100 },
              (response) => response.data.files || []
            );
            const cmp = await github.rest.repos.compareCommitsWithBasehead({
              owner, repo, basehead: `${base}...${head}`,
            });
            console.log(
              `Compare ${base}...${head}: status=${cmp.data.status}, ` +
              `ahead_by=${cmp.data.ahead_by}, behind_by=${cmp.data.behind_by}, files=${files.length}`
            );

            if (cmp.data.ahead_by === 0 || files.length === 0) {
              core.info(`No effective diff between \`${head}\` and \`${base}\`; skipping.`);
              core.setOutput('mode', 'skip');
              return;
            }

            if (!isStabilization) {
              core.setOutput('mode', 'direct-pr');
              core.setOutput('ahead-by', String(cmp.data.ahead_by));
              return;
            }

            // Stabilization: filter to allowed files; cherry-pick just those.
            const allowed = files.filter(isAllowedStabilizationFile);
            const skipped = files.filter(f => !isAllowedStabilizationFile(f));
            if (allowed.length === 0) {
              core.info(`No allow-listed files for \`${base}\`; skipping.`);
              core.setOutput('mode', 'skip');
              return;
            }
            if (skipped.length > 0) {
              core.notice(
                `\`${base}\`: cherry-picking ${allowed.length} allow-listed file(s); ` +
                `leaving ${skipped.length} non-allow-listed file(s) on \`main\` only. ` +
                `Use \`patch-propagate.yml\` for targeted backports of the rest.`
              );
              console.log(
                'Non-allow-listed (kept on main only): ' +
                skipped.map(f => `${f.filename} [${f.status}]`).slice(0, 50).join(', ')
              );
            }

            // Emit compact plan for the shell step.
            const plan = allowed.map(f => ({
              status: f.status,
              filename: f.filename,
              previous_filename: f.previous_filename || null,
            }));
            core.setOutput('mode', 'cherry-pick');
            core.setOutput('plan', JSON.stringify(plan));
            core.setOutput('allowed-count', String(allowed.length));
            core.setOutput('skipped-count', String(skipped.length));

      # --- dev: direct main → dev PR ---------------------------------------
      - name: Ensure or reuse PR main → ${{ matrix.target }}
        if: steps.plan.outputs.mode == 'direct-pr'
        id: direct-pr
        uses: actions/github-script@v7
        with:
          script: |
            const base = '${{ matrix.target }}';
            const head = 'main';
            const { owner, repo } = context.repo;

            const existing = await github.rest.pulls.list({
              owner, repo, state: 'open',
              head: `${owner}:${head}`, base, per_page: 1,
            });
            if (existing.data.length > 0) {
              const pr = existing.data[0];
              core.info(`Reusing existing open PR #${pr.number}: ${pr.html_url}`);
              core.setOutput('pr-number', String(pr.number));
              core.setOutput('pr-title', pr.title);
              core.summary.addRaw(`- ♻️ Reused PR [#${pr.number}](${pr.html_url}) → \`${base}\`\n`);
              await core.summary.write();
              return;
            }

            const body = [
              `Automated sync of direct commits to \`main\` (e.g., workflow or hash updates) into \`${base}\`.`,
              '',
              `- Source: \`${head}\``,
              `- Target: \`${base}\``,
              `- Commits ahead: ${{ steps.plan.outputs.ahead-by }}`,
              '',
              'This PR is kept open and reused on subsequent `main` updates.',
            ].join('\n');
            const created = await github.rest.pulls.create({
              owner, repo, head, base,
              title: `chore: sync main → ${base}`,
              body, maintainer_can_modify: true,
            });
            core.info(`Created PR #${created.data.number}: ${created.data.html_url}`);
            core.setOutput('pr-number', String(created.data.number));
            core.setOutput('pr-title', `chore: sync main → ${base}`);
            core.summary.addRaw(`- ✅ Created PR [#${created.data.number}](${created.data.html_url}) → \`${base}\`\n`);
            await core.summary.write();

      - name: Dispatch required PR checks for direct sync PR
        if: steps.plan.outputs.mode == 'direct-pr' && steps.direct-pr.outputs.pr-number != ''
        uses: ./.github/actions/dispatch-required-pr-checks
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          pr-number: ${{ steps.direct-pr.outputs.pr-number }}
          base-ref: ${{ matrix.target }}
          pr-title: ${{ steps.direct-pr.outputs.pr-title }}

      # --- dev-*: cherry-pick allow-listed files to a sync branch ----------
      - name: Checkout repository
        if: steps.plan.outputs.mode == 'cherry-pick'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply allow-listed files from main onto sync branch
        if: steps.plan.outputs.mode == 'cherry-pick'
        id: apply
        env:
          TARGET: ${{ matrix.target }}
          PLAN_JSON: ${{ steps.plan.outputs.plan }}
        shell: bash
        run: |
          set -euo pipefail

          SYNC_BRANCH="sync/main-to-${TARGET}"
          echo "sync-branch=${SYNC_BRANCH}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "${TARGET}" main --no-tags

          # Start (or reset) sync branch from the target tip.
          git checkout -B "${SYNC_BRANCH}" "origin/${TARGET}"

          # Apply each allow-listed file from origin/main.
          mapfile -t LINES < <(echo "${PLAN_JSON}" | jq -c '.[]')
          for entry in "${LINES[@]}"; do
            status=$(echo "$entry" | jq -r '.status')
            filename=$(echo "$entry" | jq -r '.filename')
            previous=$(echo "$entry" | jq -r '.previous_filename // empty')
            echo "::group::[$status] $filename${previous:+ (was: $previous)}"
            case "$status" in
              added|modified|changed|copied)
                mkdir -p "$(dirname -- "$filename")"
                git checkout origin/main -- "$filename"
                git add -- "$filename"
                ;;
              renamed)
                if [ -n "$previous" ] && git ls-files --error-unmatch -- "$previous" >/dev/null 2>&1; then
                  git rm -f -- "$previous"
                fi
                mkdir -p "$(dirname -- "$filename")"
                git checkout origin/main -- "$filename"
                git add -- "$filename"
                ;;
              removed)
                if git ls-files --error-unmatch -- "$filename" >/dev/null 2>&1; then
                  git rm -f -- "$filename"
                else
                  echo "File already absent on ${TARGET}; skipping delete."
                fi
                ;;
              *)
                echo "::warning::Unhandled file status '$status' for '$filename'; skipping."
                ;;
            esac
            echo "::endgroup::"
          done

          if git diff --cached --quiet; then
            echo "No effective changes after applying allow-list (${TARGET} already in sync)."
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: sync allow-listed files from main → ${TARGET}"
          git push --force-with-lease origin "${SYNC_BRANCH}"
          echo "has-changes=true" >> "$GITHUB_OUTPUT"

      - name: Ensure or reuse PR ${{ steps.apply.outputs.sync-branch }} → ${{ matrix.target }}
        if: steps.plan.outputs.mode == 'cherry-pick' && steps.apply.outputs.has-changes == 'true'
        id: cherry-pick-pr
        uses: actions/github-script@v7
        env:
          SYNC_BRANCH: ${{ steps.apply.outputs.sync-branch }}
          ALLOWED_COUNT: ${{ steps.plan.outputs.allowed-count }}
          SKIPPED_COUNT: ${{ steps.plan.outputs.skipped-count }}
        with:
          script: |
            const base = '${{ matrix.target }}';
            const head = process.env.SYNC_BRANCH;
            const { owner, repo } = context.repo;

            const existing = await github.rest.pulls.list({
              owner, repo, state: 'open',
              head: `${owner}:${head}`, base, per_page: 1,
            });
            if (existing.data.length > 0) {
              const pr = existing.data[0];
              core.info(`Reusing existing open PR #${pr.number}: ${pr.html_url}`);
              core.setOutput('pr-number', String(pr.number));
              core.setOutput('pr-title', pr.title);
              core.summary.addRaw(`- ♻️ Reused PR [#${pr.number}](${pr.html_url}) → \`${base}\` (${process.env.ALLOWED_COUNT} file(s), ${process.env.SKIPPED_COUNT} skipped)\n`);
              await core.summary.write();
              return;
            }

            const body = [
              `Automated sync of **allow-listed** files from \`main\` into \`${base}\`.`,
              '',
              `- Source: \`main\` (via \`${head}\`)`,
              `- Target: \`${base}\``,
              `- Allow-listed files applied: ${process.env.ALLOWED_COUNT}`,
              `- Non-allow-listed files left on \`main\`: ${process.env.SKIPPED_COUNT}`,
              '',
              'Allow-list for stabilization branches: any change under `.github/`, `.windsurf/`, `.githooks/`, `hashes/`, plus *modifications* to existing `src/SmartHopper.Providers.*/*ProviderModels.cs` files.',
              '',
              'This PR is kept open and its branch is refreshed on subsequent `main` updates.',
            ].join('\n');
            const created = await github.rest.pulls.create({
              owner, repo, head, base,
              title: `chore: sync main → ${base} (infra + provider models)`,
              body, maintainer_can_modify: true,
            });
            core.info(`Created PR #${created.data.number}: ${created.data.html_url}`);
            core.setOutput('pr-number', String(created.data.number));
            core.setOutput('pr-title', `chore: sync main → ${base} (infra + provider models)`);
            core.summary.addRaw(`- ✅ Created PR [#${created.data.number}](${created.data.html_url}) → \`${base}\` (${process.env.ALLOWED_COUNT} file(s), ${process.env.SKIPPED_COUNT} skipped)\n`);
            await core.summary.write();

      - name: Dispatch required PR checks for cherry-pick sync PR
        if: steps.plan.outputs.mode == 'cherry-pick' && steps.apply.outputs.has-changes == 'true' && steps.cherry-pick-pr.outputs.pr-number != ''
        uses: ./.github/actions/dispatch-required-pr-checks
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ steps.apply.outputs.sync-branch }}
          pr-number: ${{ steps.cherry-pick-pr.outputs.pr-number }}
          base-ref: ${{ matrix.target }}
          pr-title: ${{ steps.cherry-pick-pr.outputs.pr-title }}
