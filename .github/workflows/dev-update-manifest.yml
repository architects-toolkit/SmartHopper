name: 📋 Dev - Auto Update Manifest Text

# Description: This workflow automatically updates the manifest.yml text based on the
# version type in Solution.props. For -dev versions, it uses alpha text. For -beta 
# versions, it uses beta text. For stable versions, it uses the stable text.
#
# Triggers:
# - Automatically when Solution.props is modified in dev branch
# - Automatically when a PR to dev is merged that modifies Solution.props
#
# Permissions:
# - contents:write - Required to commit manifest changes

on:
  push:
    branches:
      - dev
    paths:
      - 'Solution.props'
  pull_request:
    branches:
      - dev
    types:
      - closed
    paths:
      - 'Solution.props'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  update-manifest:
    name: 📋 Update Manifest Text for Dev Version
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from Solution.props
        id: version
        uses: ./.github/actions/versioning/get-version

      - name: Update manifest.yml note text
        id: update_manifest
        uses: ./.github/actions/versioning/update-manifest-text
        with:
          version: ${{ steps.version.outputs.version }}
          update-file: 'true'

      - name: Check for changes
        id: check_changes
        run: |
          if [ "${{ steps.update_manifest.outputs.file-updated }}" = "true" ] || ! git diff --quiet yak-package/manifest.yml; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Manifest text updated"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes needed - manifest already up to date"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add yak-package/manifest.yml
          git commit -m "chore: update manifest text to ${{ steps.update_manifest.outputs.release-type }} version [skip ci]"
          # Belt-and-braces against external commits landing between fetch and push.
          # Retry pull --rebase + push up to 3 times in case of a near-simultaneous push.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin dev && \
              git push origin HEAD:dev && break
            echo "Push attempt $attempt failed, retrying..."
            sleep $((attempt * 2))
          done
