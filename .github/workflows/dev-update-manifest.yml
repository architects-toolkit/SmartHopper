name: 📋 Dev - Auto Update Manifest Text

# Related workflows (triggered on Solution.props / version changes):
#   - chore-version-date.yml (updates version date suffix on dev/release pushes)
#   - chore-version-badge.yml (updates README badge on version change)
#   - chore-version-main-release.yml (strips date suffix for main release PRs)
#   - dev-update-manifest.yml (updates manifest text on dev version change)

# Description: This workflow automatically updates the manifest.yml text based on the
# version type in Solution.props. For -dev versions, it uses alpha text. For -beta
# versions, it uses beta text. For stable versions, it uses the stable text.
#
# Creates a PR instead of pushing directly to dev (respects branch protection).
#
# Triggers:
# - Automatically when Solution.props is modified in dev branch
# - Automatically when a PR to dev is merged that modifies Solution.props
#
# Permissions:
# - actions:write - Required to dispatch PR check workflows
# - contents:write - Required to create branches and commit changes
# - pull-requests:write - Required to create PRs

on:
  push:
    branches:
      - dev
    paths:
      - 'Solution.props'
  pull_request:
    branches:
      - dev
    types:
      - closed
    paths:
      - 'Solution.props'

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false  # Must complete: manifest updates should not be cancelled mid-flight

jobs:
  update-manifest:
    name: 📋 Update Manifest Text for Dev Version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from Solution.props
        id: version
        uses: ./.github/actions/versioning/get-version

      - name: Update manifest.yml note text
        id: update_manifest
        uses: ./.github/actions/versioning/update-manifest-text
        with:
          version: ${{ steps.version.outputs.version }}
          update-file: 'true'

      - name: Check for changes
        id: check_changes
        run: |
          if [ "${{ steps.update_manifest.outputs.file-updated }}" = "true" ] || ! git diff --quiet yak-package/manifest.yml; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Manifest text updated"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes needed - manifest already up to date"
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update manifest text to ${{ steps.update_manifest.outputs.release-type }} version"
          title: "chore: update manifest text to ${{ steps.update_manifest.outputs.release-type }} version"
          body: |
            This PR updates the manifest.yml text to match the current version type in Solution.props.

            - Version: `${{ steps.version.outputs.version }}`
            - Release type: `${{ steps.update_manifest.outputs.release-type }}`

            This is an automated PR created by the Dev Update Manifest workflow.
          branch: "chore/update-manifest-text"
          base: dev
          delete-branch: true
          labels: |
            automated

      - name: Assign PR to Milestone
        if: steps.check_changes.outputs.changed == 'true' && steps.create-pr.outputs.pull-request-number != ''
        uses: ./.github/actions/milestone/assign-pr
        with:
          pr-number: ${{ steps.create-pr.outputs.pull-request-number }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch required PR checks
        if: steps.check_changes.outputs.changed == 'true' && steps.create-pr.outputs.pull-request-number != ''
        uses: ./.github/actions/dispatch-required-pr-checks
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: chore/update-manifest-text
          pr-number: ${{ steps.create-pr.outputs.pull-request-number }}
          base-ref: dev
          pr-title: "chore: update manifest text to ${{ steps.update_manifest.outputs.release-type }} version"

      - name: Label PR on failure
        if: failure() && steps.create-pr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create-pr.outputs.pull-request-number }},
              labels: ['needs-attention']
            });
