name: pr-delete-auto-branches

# Description: Deletes auto-generated branches when a pull request is closed (merged or not) if the branch name matches predefined patterns.
# 
# This workflow triggers on pull_request closed events and deletes the head branch when it matches any of:
# - update-branch/*
# - chore/*
# - docs/*
# - ci/*
# - release/*
# - feature/*
# - feat/*
# - hotfix/*
# - bugfix/*
# - bug/*
# - fix/*
# - hash-update/*
# - patch/*
# - devin/*
# - backport/*
#
# A branch is only deleted if there are no other open PRs from the same branch.
#
# Triggers:
# - pull_request.types: closed
#
# Permissions:
# - contents: write - Required to delete branches

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

jobs:
  delete-auto-branches:
    name: Delete auto branches
    if: |
      startsWith(github.event.pull_request.head.ref, 'update-branch/') ||
      startsWith(github.event.pull_request.head.ref, 'chore/') ||
      startsWith(github.event.pull_request.head.ref, 'docs/') ||
      startsWith(github.event.pull_request.head.ref, 'ci/') ||
      startsWith(github.event.pull_request.head.ref, 'release/') ||
      startsWith(github.event.pull_request.head.ref, 'feature/') ||
      startsWith(github.event.pull_request.head.ref, 'feat/') ||
      startsWith(github.event.pull_request.head.ref, 'hotfix/') ||
      startsWith(github.event.pull_request.head.ref, 'bugfix/') ||
      startsWith(github.event.pull_request.head.ref, 'bug/') ||
      startsWith(github.event.pull_request.head.ref, 'fix/') ||
      startsWith(github.event.pull_request.head.ref, 'hash-update/') ||
      startsWith(github.event.pull_request.head.ref, 'patch/') ||
      startsWith(github.event.pull_request.head.ref, 'devin/') ||
      startsWith(github.event.pull_request.head.ref, 'backport/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check for open PRs from this branch
        id: check-open-prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          OPEN_PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${BRANCH}" \
            --state open \
            --json number \
            --jq 'length')
          if [ "$OPEN_PRS" -gt 0 ]; then
            echo "Found ${OPEN_PRS} open PR(s) from ${BRANCH}. Skipping deletion."
            echo "has_open_prs=true" >> $GITHUB_OUTPUT
          else
            echo "No open PRs from ${BRANCH}."
            echo "has_open_prs=false" >> $GITHUB_OUTPUT
          fi

      - name: Delete branch
        if: steps.check-open-prs.outputs.has_open_prs == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          HTTP_CODE=$(gh api \
            -X DELETE \
            "repos/${{ github.repository }}/git/refs/heads/${BRANCH}" \
            --silent \
            2>&1) && echo "Deleted branch ${BRANCH}" || {
            echo "::notice::Branch ${BRANCH} could not be deleted (may already be gone). This is expected."
          }
