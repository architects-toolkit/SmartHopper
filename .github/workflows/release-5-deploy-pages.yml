name: 🏁 5 Deploy GitHub Pages on Hash PR Merge

# Related workflows (release pipeline — execute in numbered order):
#   - release-1-milestone.yml (creates milestone and branches)
#   - release-2-pr-to-dev-closed.yml (creates PR from dev→main on release merge)
#   - release-3-pr-to-main-closed.yml (creates GitHub Release on main merge)
#   - release-4-build.yml (builds platform artifacts on release publish)
#   - release-5-deploy-pages.yml (deploys documentation pages)
#   - release-6-upload-yak.yml (uploads to Yak package manager)

# Description: This workflow deploys GitHub Pages after changes are pushed to main.
# It reads all hash files from the /hashes folder in the repository and generates
# a complete versions manifest for the GitHub Pages site.
#
# Triggers:
# - Automatically when commits are pushed to main branch
# - Manual trigger via workflow_dispatch
#
# Permissions:
# - contents:read - Required to read repository content
# - pages:write - Required to deploy to GitHub Pages
# - id-token:write - Required for GitHub Pages OIDC authentication

on:
  push:
    branches:
      - main
    paths:
      - 'hashes/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (extracts from latest release if empty)'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    # Run on push to main or manual trigger
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout main branch
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0
    
    - name: Verify hashes folder exists
      shell: pwsh
      run: |
        if (!(Test-Path "hashes")) {
          Write-Host "##[error] /hashes folder does not exist!"
          exit 1
        }
        
        $hashFiles = Get-ChildItem -Path "hashes" -Filter "*.json" -File
        if ($hashFiles.Count -eq 0) {
          Write-Host "##[error] No hash files found in /hashes folder"
          exit 1
        }
        
        Write-Host "✓ Found $($hashFiles.Count) hash file(s) in /hashes folder:"
        foreach ($file in $hashFiles) {
          Write-Host "  - $($file.Name)"
        }
    
    - name: Generate GitHub Pages Content
      uses: ./.github/actions/generate-github-pages
      with:
        hashes-folder: 'hashes'
        pages-directory: '.github/pages'
        repository: ${{ github.repository }}
    
    - name: Upload GitHub Pages Artifact
      uses: ./.github/actions/publish-github-pages
      with:
        pages-directory: '.github/pages'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
