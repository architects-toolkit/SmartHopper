name: đź”„ Release Promotion (Alphaâ†’Betaâ†’RCâ†’Stable)

# Description: Automatically promotes versions through release stages when no issues
# are reported within 30 days of release.
#
# Flow:
# 1. Checks for issues labeled with the released version
# 2. If no issues found after 30 days, promotes to next stage (alphaâ†’betaâ†’rcâ†’stable)
# 3. Creates release branch and PR for the promotion
#
# Triggers:
# - Workflow dispatch (manual)
# - Scheduled daily (cron)
# - After release published

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Specific version to check for promotion (leave empty to check all recent releases)'
        required: false
        type: string
        default: ''
      force-promote:
        description: 'Force promotion even if issues exist (use with caution)'
        required: false
        type: boolean
        default: false
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  release:
    types: [published]

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  determine-versions-to-check:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
      has-versions: ${{ steps.get-versions.outputs.has_versions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get versions to check
        id: get-versions
        uses: actions/github-script@v7
        with:
          script: |
            // Parse semantic version from string
            function parseVersion(versionStr) {
              const match = versionStr.match(/^(\d+)\.(\d+)\.(\d+)(?:-(.+))?$/);
              if (!match) return null;
              
              return {
                major: parseInt(match[1]),
                minor: parseInt(match[2]),
                patch: parseInt(match[3]),
                suffix: match[4] || 'stable',
                original: versionStr
              };
            }
            
            // Get open milestones
            const { data: milestones } = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            
            const openMilestoneVersions = new Set(milestones.map(m => m.title));
            console.log('Open milestones:', Array.from(openMilestoneVersions));
            
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 20
            });
            
            const specificVersion = '${{ github.event.inputs.version }}';
            let versionsToCheck = [];
            
            if (specificVersion) {
              // Use specific version from input
              versionsToCheck = [specificVersion];
            } else {
              // Filter for alpha, beta, rc releases (not stable) that have open milestones
              const preReleases = releases.filter(r => {
                const tag = r.tag_name;
                const isPreRelease = tag.includes('-alpha') || tag.includes('-beta') || tag.includes('-rc');
                const hasOpenMilestone = openMilestoneVersions.has(tag);
                return isPreRelease && hasOpenMilestone;
              });
              
              // Group by base version and suffix, keep only latest of each suffix
              const versionsByBaseAndSuffix = {};
              
              for (const release of preReleases) {
                const parsed = parseVersion(release.tag_name);
                if (!parsed) continue;
                
                const baseKey = `${parsed.major}.${parsed.minor}.${parsed.patch}`;
                const suffixKey = `${baseKey}:${parsed.suffix}`;
                
                if (!versionsByBaseAndSuffix[suffixKey]) {
                  versionsByBaseAndSuffix[suffixKey] = release.tag_name;
                }
              }
              
              versionsToCheck = Object.values(versionsByBaseAndSuffix);
            }
            
            console.log('Versions to check for promotion:', versionsToCheck);
            
            core.setOutput('versions', JSON.stringify(versionsToCheck));
            core.setOutput('has_versions', versionsToCheck.length > 0 ? 'true' : 'false');

  check-and-promote:
    needs: determine-versions-to-check
    if: needs.determine-versions-to-check.outputs.has-versions == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ${{ fromJson(needs.determine-versions-to-check.outputs.versions) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for issues with version label
        id: check-issues
        uses: ./.github/actions/versioning/check-issues-for-version
        with:
          version: ${{ matrix.version }}
          days-lookback: '30'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine if promotion needed
        id: should-promote
        shell: pwsh
        run: |
          $hasIssues = "${{ steps.check-issues.outputs.has-issues }}" -eq "true"
          $forcePromote = "${{ github.event.inputs.force-promote }}" -eq "true"
          $issueCount = "${{ steps.check-issues.outputs.issue-count }}"
          $version = "${{ matrix.version }}"
          
          Write-Host "Checking promotion for version: $version"
          Write-Host "Has issues: $hasIssues"
          Write-Host "Issue count: $issueCount"
          Write-Host "Force promote: $forcePromote"
          
          # Check if version is old enough (at least 30 days since release)
          # This is a basic check - in a full implementation you'd query the release date
          
          if ($forcePromote) {
            Write-Host "âš ď¸Ź Force promotion enabled - promoting despite $issueCount issues"
            echo "should_promote=true" >> $env:GITHUB_OUTPUT
            echo "reason=force_promote" >> $env:GITHUB_OUTPUT
          } elseif (-not $hasIssues) {
            Write-Host "âś… No issues reported for 30 days - ready for promotion"
            echo "should_promote=true" >> $env:GITHUB_OUTPUT
            echo "reason=no_issues" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "âŹ¸ď¸Ź $issueCount issues still open - deferring promotion"
            echo "should_promote=false" >> $env:GITHUB_OUTPUT
            echo "reason=issues_exist" >> $env:GITHUB_OUTPUT
          }

      - name: Promote version
        if: steps.should-promote.outputs.should-promote == 'true'
        id: promote
        uses: ./.github/actions/versioning/promote-version
        with:
          current-version: ${{ matrix.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          auto-merge: 'false'

      - name: Create new version label
        if: steps.should-promote.outputs.should-promote == 'true'
        uses: ./.github/actions/versioning/create-version-label
        with:
          version: ${{ steps.promote.outputs.new-version }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## Promotion Check for ${{ matrix.version }}"
          echo ""
          echo "- Has Issues: ${{ steps.check-issues.outputs.has-issues }}"
          echo "- Issue Count: ${{ steps.check-issues.outputs.issue-count }}"
          echo "- Should Promote: ${{ steps.should-promote.outputs.should-promote }}"
          echo "- Reason: ${{ steps.should-promote.outputs.reason }}"
          echo ""
          if [ "${{ steps.should-promote.outputs.should-promote }}" == "true" ]; then
            echo "- âś… Promoted: ${{ matrix.version }} â†’ ${{ steps.promote.outputs.new-version }}"
            echo "- Previous Stage: ${{ steps.promote.outputs.previous-stage }}"
            echo "- New Stage: ${{ steps.promote.outputs.new-stage }}"
            echo "- PR Created: ${{ steps.promote.outputs.pr-created }}"
            echo "- PR Number: ${{ steps.promote.outputs.pr-number }}"
          fi
