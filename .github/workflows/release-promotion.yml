name: 🔄 Release Promotion (Alpha→Beta→RC→Stable)

# Description: Automatically promotes stabilization versions through release stages when no issues
# are reported within 30 days of release.
#
# Flow:
# 1. Scans open no-suffix milestones (e.g. "1.4.2") to discover active stabilization paths
# 2. For each, finds the current staged release (alpha/beta/rc)
# 3. Checks promotion eligibility (age ≥ 30d, no open issues)
# 4. If eligible: creates next-stage milestone, closes current staged milestone,
#    and dispatches release-1-milestone.yml for the new stage
#
# Triggers:
# - Workflow dispatch (manual)
# - Scheduled daily (cron)
# - After release published

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Specific staged version to check (e.g. 1.4.2-alpha). Leave empty to check all stabilization paths.'
        required: false
        type: string
        default: ''
      force-promote:
        description: 'Force promotion even if issues exist (use with caution)'
        required: false
        type: boolean
        default: false
  schedule:
    # Run daily at 4 AM UTC
    - cron: '0 4 * * *'
  release:
    types: [published]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  determine-versions-to-check:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
      has-versions: ${{ steps.get-versions.outputs.has_versions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get versions to check
        id: get-versions
        uses: actions/github-script@v7
        with:
          script: |
            // Parse semantic version from string
            function parseVersion(versionStr) {
              const match = versionStr.match(/^(\d+)\.(\d+)\.(\d+)(?:-(.+))?$/);
              if (!match) return null;
              return {
                major: parseInt(match[1]),
                minor: parseInt(match[2]),
                patch: parseInt(match[3]),
                suffix: match[4] || null,
                original: versionStr
              };
            }

            const specificVersion = '${{ github.event.inputs.version }}';
            let versionsToCheck = [];

            if (specificVersion) {
              versionsToCheck = [specificVersion];
            } else {
              // Discover active stabilization paths via open no-suffix milestones
              const [openMilestones, { data: releases }] = await Promise.all([
                github.paginate(github.rest.issues.listMilestones, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  per_page: 100
                }),
                github.rest.repos.listReleases({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: 100
                })
              ]);

              // Filter to X.Y.Z milestones (no suffix = stabilization path marker)
              const stabilizationMilestones = openMilestones.filter(m => /^\d+\.\d+\.\d+$/.test(m.title));
              console.log('Active stabilization milestones:', stabilizationMilestones.map(m => m.title));

              // Build a set of all release tag names for fast lookup
              const releaseTags = new Set(releases.map(r => r.tag_name));

              // For each stabilization path, find the current staged release
              // Priority: rc > beta > alpha (promote the most advanced stage that exists)
              const stagePriority = ['rc', 'beta', 'alpha'];

              for (const milestone of stabilizationMilestones) {
                const base = milestone.title; // e.g. "1.4.2"
                let currentStaged = null;

                for (const stage of stagePriority) {
                  const candidate = `${base}-${stage}`;
                  if (releaseTags.has(candidate)) {
                    currentStaged = candidate;
                    console.log(`Stabilization path ${base}: current staged release is ${candidate}`);
                    break;
                  }
                }

                if (currentStaged) {
                  versionsToCheck.push(currentStaged);
                } else {
                  console.log(`Stabilization path ${base}: no staged release found yet, skipping.`);
                }
              }
            }

            console.log('Versions to check for promotion:', versionsToCheck);
            core.setOutput('versions', JSON.stringify(versionsToCheck));
            core.setOutput('has_versions', versionsToCheck.length > 0 ? 'true' : 'false');

  check-and-promote:
    needs: determine-versions-to-check
    if: needs.determine-versions-to-check.outputs.has-versions == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ${{ fromJson(needs.determine-versions-to-check.outputs.versions) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for issues with version label
        id: check-issues
        uses: ./.github/actions/versioning/check-issues-for-version
        with:
          version: ${{ matrix.version }}
          days-lookback: '30'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine if promotion needed
        id: should-promote
        shell: pwsh
        run: |
          $canPromote = "${{ steps.check-issues.outputs.can-promote }}" -eq "true"
          $forcePromote = "${{ github.event.inputs.force-promote }}" -eq "true"
          $blockingReason = "${{ steps.check-issues.outputs.blocking-reason }}"
          $version = "${{ matrix.version }}"

          Write-Host "=== Promotion Decision for $version ==="
          Write-Host ""
          Write-Host "Validation Results:"
          Write-Host "  • Milestone open issues: ${{ steps.check-issues.outputs.milestone-open-count }}"
          Write-Host "  • Release age: ${{ steps.check-issues.outputs.release-age-days }} days"
          Write-Host "  • Last closed issue age: ${{ steps.check-issues.outputs.last-closed-age-days }} days"
          Write-Host "  • Can promote: $canPromote"
          if (-not $canPromote) {
            Write-Host "  • Blocking reason: $blockingReason"
          }
          Write-Host "  • Force promote: $forcePromote"
          Write-Host ""

          if ($forcePromote) {
            Write-Host "⚠️ FORCE PROMOTION ENABLED - Bypassing all validation checks"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "should-promote=true"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "reason=force_promote"
          } elseif ($canPromote) {
            Write-Host "✅ ALL CONDITIONS MET - Promoting $version"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "should-promote=true"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "reason=all_conditions_met"
          } else {
            Write-Host "❌ PROMOTION BLOCKED - $blockingReason"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "should-promote=false"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "reason=$blockingReason"
          }

      - name: Compute next stage version
        if: steps.should-promote.outputs.should-promote == 'true'
        id: compute-next
        uses: actions/github-script@v7
        with:
          script: |
            const current = '${{ matrix.version }}';
            const match = current.match(/^(\d+\.\d+\.\d+)-(\w+)$/);
            if (!match) {
              core.setFailed(`Cannot parse version: ${current}`);
              return;
            }
            const base = match[1];
            const stage = match[2];
            let nextVersion, nextStage;
            if (stage === 'alpha') { nextVersion = `${base}-beta`; nextStage = 'beta'; }
            else if (stage === 'beta') { nextVersion = `${base}-rc`; nextStage = 'rc'; }
            else if (stage === 'rc') { nextVersion = base; nextStage = 'stable'; }
            else { core.setFailed(`Unknown stage: ${stage}`); return; }

            console.log(`Promoting ${current} → ${nextVersion}`);
            core.setOutput('next-version', nextVersion);
            core.setOutput('next-stage', nextStage);
            core.setOutput('base-version', base);
            core.setOutput('current-stage', stage);

      - name: Create next-stage milestone
        if: steps.should-promote.outputs.should-promote == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const nextVersion = '${{ steps.compute-next.outputs.next-version }}';
            const nextStage = '${{ steps.compute-next.outputs.next-stage }}';
            if (nextStage === 'stable') {
              console.log('Promoting to stable — no new milestone needed (parent milestone already exists).');
              return;
            }
            try {
              await github.rest.issues.createMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: nextVersion,
                description: `Auto-created by release-promotion for ${nextVersion}`
              });
              console.log(`✅ Created milestone: ${nextVersion}`);
            } catch (e) {
              if (e.message.includes('already exists')) {
                console.log(`ℹ️ Milestone ${nextVersion} already exists`);
              } else {
                throw e;
              }
            }

      - name: Close current staged milestone
        if: steps.should-promote.outputs.should-promote == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const currentVersion = '${{ matrix.version }}';
            const milestones = await github.paginate(github.rest.issues.listMilestones, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const milestone = milestones.find(m => m.title === currentVersion);
            if (milestone) {
              await github.rest.issues.updateMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                milestone_number: milestone.number,
                state: 'closed'
              });
              console.log(`✅ Closed milestone: ${currentVersion}`);
            } else {
              console.log(`ℹ️ Milestone '${currentVersion}' not found or already closed`);
            }

      - name: Create new version label
        if: steps.should-promote.outputs.should-promote == 'true'
        uses: ./.github/actions/versioning/create-version-label
        with:
          version: ${{ steps.compute-next.outputs.next-version }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch release-1-milestone.yml
        if: steps.should-promote.outputs.should-promote == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const nextVersion = '${{ steps.compute-next.outputs.next-version }}';
            console.log(`Dispatching release-1-milestone.yml for ${nextVersion}`);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release-1-milestone.yml',
              ref: 'main',
              inputs: {
                'milestone-title': nextVersion
              }
            });
            console.log(`✅ Dispatched release-1-milestone.yml for ${nextVersion}`);

      - name: Summary
        if: always()
        run: |
          echo "## 🔄 Promotion Check for ${{ matrix.version }}"
          echo ""
          echo "### Validation Checks"
          echo ""
          echo "| Check | Status | Details |"
          echo "|-------|--------|---------|"
          echo "| **Version Label Issues** | ${{ steps.check-issues.outputs.has-issues == 'false' && '✅ Pass' || '❌ Fail' }} | ${{ steps.check-issues.outputs.issue-count }} open issue(s) with label |"
          echo "| **Release Age** | ${{ steps.check-issues.outputs.release-old-enough == 'true' && '✅ Pass' || '❌ Fail' }} | ${{ steps.check-issues.outputs.release-age-days }} days (min: 30) |"
          echo "| **Last Closed Issue** | ${{ steps.check-issues.outputs.last-closed-old-enough == 'true' && '✅ Pass' || '❌ Fail' }} | ${{ steps.check-issues.outputs.last-closed-age-days }} days since last close |"
          echo ""
          echo "### Decision"
          echo ""
          echo "- **Can Promote:** ${{ steps.check-issues.outputs.can-promote }}"
          echo "- **Should Promote:** ${{ steps.should-promote.outputs.should-promote }}"
          echo "- **Reason:** ${{ steps.should-promote.outputs.reason }}"
          if [ "${{ steps.check-issues.outputs.can-promote }}" != "true" ]; then
            echo "- **Blocking Reason:** ${{ steps.check-issues.outputs.blocking-reason }}"
          fi
          echo ""
          if [ "${{ steps.should-promote.outputs.should-promote }}" == "true" ]; then
            echo "### ✅ Promotion Dispatched"
            echo ""
            echo "- **Promoting:** ${{ matrix.version }} → ${{ steps.compute-next.outputs.next-version }}"
            echo "- **New Stage:** ${{ steps.compute-next.outputs.next-stage }}"
            echo "- **release-1-milestone.yml dispatched for:** ${{ steps.compute-next.outputs.next-version }}"
          else
            echo "### ❌ Promotion Blocked"
            echo ""
            echo "Version ${{ matrix.version }} cannot be promoted at this time."
          fi
