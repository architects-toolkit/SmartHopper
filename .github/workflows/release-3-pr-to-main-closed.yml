name: 🏁 3 Create Release on Release PR Close

# Related workflows (release pipeline — execute in numbered order):
#   - release-1-milestone.yml (creates milestone and branches)
#   - release-2-pr-to-dev-closed.yml (creates PR from dev→main on release merge)
#   - release-3-pr-to-main-closed.yml (creates GitHub Release on main merge)
#   - release-4-build.yml (builds platform artifacts on release publish)
#   - release-5-deploy-pages.yml (deploys documentation pages)
#   - release-6-upload-yak.yml (uploads to Yak package manager)

# Description: This workflow automatically creates a GitHub Release when a release PR is closed.
# It extracts the milestone title as the version number and compiles release notes from
# all issues and pull requests associated with the milestone.
# Supports both main (regular releases) and main-X.Y.Z (stabilization path releases).
#
# Triggers:
# - Automatically when a PR to main or main-* is closed
#
# Permissions:
# - contents:write - Required to create GitHub releases
# - issues:read - Required to read issue information for release notes
# - pull-requests:write - Required to read PR information for release notes and
#                         create template update PRs via peter-evans/create-pull-request

on:
  pull_request:
    types: [ closed ]
    branches:
      - main
      - 'main-*'
  workflow_dispatch:

concurrency:
  group: release-pr-main-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  create-release:
    # Only run for release/hotfix/dev source branches (not chore/docs/feature PRs)
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request.merged == true && (
        startsWith(github.event.pull_request.head.ref, 'release/') ||
        startsWith(github.event.pull_request.head.ref, 'hotfix/') ||
        startsWith(github.event.pull_request.head.ref, 'dev-') ||
        github.event.pull_request.head.ref == 'dev'
      ))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: write
      issues: read
      pull-requests: write

    steps:
      - name: Determine target branch
        id: target-branch
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          # Use the actual base branch (main or main-X.Y.Z)
          echo "branch=${BASE_REF:-main}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.target-branch.outputs.branch }}

      - name: Get Release Version
        id: release_info
        uses: ./.github/actions/versioning/get-version
        with:
          branch: ${{ steps.target-branch.outputs.branch }}

      - name: Abort if dev version
        id: dev_check
        if: steps.release_info.outputs.stage == 'dev'
        run: |
          echo "::notice::Version ${{ steps.release_info.outputs.version }} is a dev build. Skipping release creation."
          echo "skip=true" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        if: steps.dev_check.outputs.skip != 'true'
        id: issues
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.release_info.outputs.version }}
          TARGET_BRANCH: ${{ steps.target-branch.outputs.branch }}
        with:
          script: |
            // Generate release notes for the new release version
            const releaseNotes = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.RELEASE_VERSION,
              target_commitish: process.env.TARGET_BRANCH
            });

            await core.setOutput('changelog', releaseNotes.data.body);

      - name: Check Prerelease Status
        if: steps.dev_check.outputs.skip != 'true'
        id: prerelease
        run: |
          title="${{ steps.release_info.outputs.version }}"
          if [[ "${title}" == *-* ]] || [[ "${title}" == *+* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: Check if Release Exists and is Not Prerelease
        if: steps.dev_check.outputs.skip != 'true'
        id: check_release
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.release_info.outputs.version }}
        with:
          script: |
            const version = process.env.RELEASE_VERSION;
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: version
              });

              // Release exists
              if (release.data.prerelease === false) {
                core.setFailed(`Release ${version} already exists and is not a pre-release. Editing stable releases is not allowed.`);
              } else {
                core.info(`Release ${version} exists but is a pre-release. Proceeding with update.`);
              }
            } catch (error) {
              if (error.status === 404) {
                core.info(`Release ${version} does not exist. Proceeding with creation.`);
              } else {
                throw error;
              }
            }

      - name: Generate AI Release Notes
        if: steps.dev_check.outputs.skip != 'true'
        id: ai_release_notes
        uses: ./.github/actions/documentation/generate-release-notes
        with:
          version: ${{ steps.release_info.outputs.version }}
          major: ${{ steps.release_info.outputs.major }}
          minor: ${{ steps.release_info.outputs.minor }}
          patch: ${{ steps.release_info.outputs.patch }}
          suffix: ${{ steps.release_info.outputs.suffix }}
          mistral-api-key: ${{ secrets.MISTRAL_API_KEY }}

      - name: Create Release
        if: steps.dev_check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release_info.outputs.version }}
          name: ${{ steps.ai_release_notes.outputs.title }}
          body: |
            ${{ steps.ai_release_notes.outputs.body }}
            
            ---
            
            <details><summary>Auto-generated release notes</summary>
            
            ${{ steps.issues.outputs.changelog }}
            
            </details>
          draft: true
          prerelease: ${{ env.IS_PRERELEASE }}
          target_commitish: ${{ steps.target-branch.outputs.branch }}

      - name: Update Issue Template Version Dropdown
        if: steps.dev_check.outputs.skip != 'true'
        id: update_template
        shell: pwsh
        run: |
          # The softprops action above doesn't fetch tags immediately into the local workspace,
          # but the new tag exists remotely. We fetch it first.
          git fetch --tags
          & .\tools\Update-VersionVerificationTemplate.ps1 -MinMajor 1
          $code = $LASTEXITCODE
          if ($code -eq 0) {
            "changed=true" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          } elseif ($code -eq 1) {
            "changed=false" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          } else {
            throw "Update-VersionVerificationTemplate.ps1 failed with exit code $code"
          }

      - name: Create Pull Request for Template Update
        if: steps.dev_check.outputs.skip != 'true' && steps.update_template.outputs.changed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(templates): add ${{ steps.release_info.outputs.version }} to model-verification template"
          title: "chore(templates): add ${{ steps.release_info.outputs.version }} to model-verification dropdown"
          body: |
            Auto-generated PR from `.github/workflows/release-3-pr-to-main-closed.yml`.
            
            Adds the newly released version `${{ steps.release_info.outputs.version }}` to the version dropdown in the model verification issue template.
          branch: "chore/update-version-dropdown-${{ steps.release_info.outputs.version }}"
          base: ${{ steps.target-branch.outputs.branch }}
          delete-branch: true
          labels: |
            automated

      - name: Dispatch required PR checks
        if: steps.dev_check.outputs.skip != 'true' && steps.update_template.outputs.changed == 'true' && steps.create-pr.outputs.pull-request-number != ''
        uses: ./.github/actions/dispatch-required-pr-checks
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: chore/update-version-dropdown-${{ steps.release_info.outputs.version }}
          pr-number: ${{ steps.create-pr.outputs.pull-request-number }}
          base-ref: ${{ steps.target-branch.outputs.branch }}
          pr-title: "chore(templates): add ${{ steps.release_info.outputs.version }} to model-verification dropdown"

  notify-on-failure:
    needs: [create-release]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🔴 release-3 (Create Release) failed (run #${context.runNumber})`;
            const body = [
              `The **Create Release on Release PR Close** workflow failed.`,
              ``,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Ref:** \`${context.ref}\``,
              `**Triggered by:** ${context.actor}`,
              ``,
              `This is a critical release pipeline failure. Please investigate immediately.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['automated', 'status: needs attention'],
            });
