name: 🏁 3 Create Release on Release PR Close

# Description: This workflow automatically creates a GitHub Release when a release PR is closed.
# It extracts the milestone title as the version number and compiles release notes from
# all issues and pull requests associated with the milestone.
# Supports both main (regular releases) and main-X.Y.Z (stabilization path releases).
#
# Triggers:
# - Automatically when a PR to main or main-* is closed
#
# Permissions:
# - contents:write - Required to create GitHub releases
# - issues:read - Required to read issue information for release notes
# - pull-requests:read - Required to read PR information for release notes

on:
  pull_request:
    types: [ closed ]
    branches:
      - main
      - 'main-*'
  workflow_dispatch:

jobs:
  create-release:
    if: ${{ github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read

    steps:
      - name: Determine target branch
        id: target-branch
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          # Use the actual base branch (main or main-X.Y.Z)
          echo "branch=${BASE_REF:-main}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.target-branch.outputs.branch }}

      - name: Get Release Version
        id: release_info
        uses: ./.github/actions/versioning/get-version
        with:
          branch: ${{ steps.target-branch.outputs.branch }}

      - name: Generate Release Notes
        id: issues
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.release_info.outputs.version }}
          TARGET_BRANCH: ${{ steps.target-branch.outputs.branch }}
        with:
          script: |
            // Generate release notes for the new release version
            const releaseNotes = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.RELEASE_VERSION,
              target_commitish: process.env.TARGET_BRANCH
            });

            await core.setOutput('changelog', releaseNotes.data.body);

      - name: Check Prerelease Status
        id: prerelease
        run: |
          title="${{ steps.release_info.outputs.version }}"
          if [[ "${title}" == *-* ]] || [[ "${title}" == *+* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: Check if Release Exists and is Not Prerelease
        id: check_release
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.release_info.outputs.version }}
        with:
          script: |
            const version = process.env.RELEASE_VERSION;
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: version
              });

              // Release exists
              if (release.data.prerelease === false) {
                core.setFailed(`Release ${version} already exists and is not a pre-release. Editing stable releases is not allowed.`);
              } else {
                core.info(`Release ${version} exists but is a pre-release. Proceeding with update.`);
              }
            } catch (error) {
              if (error.status === 404) {
                core.info(`Release ${version} does not exist. Proceeding with creation.`);
              } else {
                throw error;
              }
            }

      - name: Generate AI Release Notes
        id: ai_release_notes
        uses: ./.github/actions/documentation/generate-release-notes
        with:
          version: ${{ steps.release_info.outputs.version }}
          major: ${{ steps.release_info.outputs.major }}
          minor: ${{ steps.release_info.outputs.minor }}
          patch: ${{ steps.release_info.outputs.patch }}
          suffix: ${{ steps.release_info.outputs.suffix }}
          mistral-api-key: ${{ secrets.MISTRAL_API_KEY }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release_info.outputs.version }}
          name: ${{ steps.ai_release_notes.outputs.title }}
          body: |
            ${{ steps.ai_release_notes.outputs.body }}
            
            ---
            
            <details><summary>Auto-generated release notes</summary>
            
            ${{ steps.issues.outputs.changelog }}
            
            </details>
          draft: true
          prerelease: ${{ env.IS_PRERELEASE }}
          target_commitish: ${{ steps.target-branch.outputs.branch }}
