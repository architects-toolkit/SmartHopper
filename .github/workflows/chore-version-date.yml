name: 🔄 Update Version Date

# Related workflows (triggered on Solution.props / version changes):
#   - chore-version-date.yml (updates version date suffix on dev/release pushes)
#   - chore-version-badge.yml (updates README badge on version change)
#   - chore-version-main-release.yml (strips date suffix for main release PRs)
#   (dev-update-manifest.yml was removed — manifest text is now resolved at build time via .manifest.json)

# Description: This workflow automatically updates the date component 
# when the version includes it. It creates a PR with the updated date
# to ensure the version reflects the latest changes.
#
# Triggers:
# - Automatically when code files or Solution.props are modified in dev branch
# - Manually via workflow_dispatch
#
# Permissions:
# - contents:write - Required to commit version changes
# - pull-requests:write - Required to create PRs with version updates

on:
  push:
    branches: 
      - dev
      - release/*
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - 'Solution.props'
      - '!.github/**'
  workflow_dispatch:  # Allow manual triggering

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-date:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set branch names
        id: set-branches
        run: |
          TARGET_BRANCH="${{ github.ref_name }}"
          echo "TARGET_BRANCH=$TARGET_BRANCH" >> $GITHUB_ENV

      - name: Get current version
        id: current-version
        uses: ./.github/actions/versioning/get-version

      - name: Auto-update version date if needed
        id: calculate-version
        uses: ./.github/actions/versioning/calculate-version
        with:
          version: ${{ steps.current-version.outputs.version }}
          increment: date
          change-pre-release: none

      # Only proceed if the date was actually updated
      - name: Update Solution.props with new version date
        id: update-version
        if: steps.calculate-version.outputs.was-date-updated == 'true'
        uses: ./.github/actions/versioning/update-version
        with:
          new-version: ${{ steps.calculate-version.outputs.new-version }}

      # Update badges to match the new version
      - name: Update badges
        id: update-badges
        if: steps.calculate-version.outputs.was-date-updated == 'true'
        uses: ./.github/actions/documentation/update-badges

      - name: Check if changes exist
        id: check-changes
        if: steps.calculate-version.outputs.was-date-updated == 'true'
        run: |
          if [[ -n "$(git status --porcelain Solution.props README.md)" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.calculate-version.outputs.was-date-updated == 'true' && steps.check-changes.outputs.has_changes == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update development version date to ${{ steps.calculate-version.outputs.new-version }}"
          title: "chore: update development version date to ${{ steps.calculate-version.outputs.new-version }}"
          body: |
            This PR updates the development version date in Solution.props to reflect the latest changes.

            This is an automated PR created by the Update Development Version Date workflow.
          branch: "chore/update-version-date-${{ github.ref_name }}"
          base: ${{ github.ref_name }}
          delete-branch: true
          labels: |
            automated

      - name: Assign PR to Milestone
        if: steps.calculate-version.outputs.was-date-updated == 'true' && steps.check-changes.outputs.has_changes == 'true' && steps.create-pr.outputs.pull-request-number != ''
        uses: ./.github/actions/milestone/assign-pr
        with:
          pr-number: ${{ steps.create-pr.outputs.pull-request-number }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch required PR checks
        if: steps.calculate-version.outputs.was-date-updated == 'true' && steps.check-changes.outputs.has_changes == 'true' && steps.create-pr.outputs.pull-request-number != ''
        uses: ./.github/actions/dispatch-required-pr-checks
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: chore/update-version-date-${{ github.ref_name }}
          pr-number: ${{ steps.create-pr.outputs.pull-request-number }}
          base-ref: ${{ github.ref_name }}
          pr-title: "chore: update development version date to ${{ steps.calculate-version.outputs.new-version }}"

      - name: Label PR on failure
        if: failure() && steps.create-pr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create-pr.outputs.pull-request-number }},
              labels: ['status: needs attention']
            });
