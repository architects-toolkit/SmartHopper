name: 🏷️ Issue Label Version from Template

# Related workflows (issue label management):
#   - github-issue-labels-close.yml (closes issue when close: label added)
#   - github-issue-labels-on-close.yml (converts status→close labels on issue close)
#   - github-labels-sync.yml (syncs label definitions from labels.yml)
#   - github-issue-label-version-from-template.yml (labels issues with version from bug report template)
#   - github-issue-label-by-content.yml (labels issues based on title/body content)

# Description: Automatically tags newly created issues with the appropriate version label
# based on the SmartHopper Version field from the bug report template.
#
# Triggers:
# - Automatically when an issue is created or opened
#
# Permissions:
# - issues:write - Required to add labels to issues

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  auto-tag-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse issue body for version
        id: parse-version
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = context.payload.issue.body || '';

            // Try to extract SmartHopper Version from issue body
            // Pattern: "SmartHopper Version" followed by input value
            const versionPatterns = [
              /SmartHopper Version\s*\n\s*([\w\.\-]+)/i,
              /### SmartHopper Version\s*\n\s*([\w\.\-]+)/i,
              /SmartHopper Version:\s*([\w\.\-]+)/i,
              /Version[\s\w:]*\n?\s*([\d]+\.[\d]+\.[\d]+[\-\w]*)/i,
              /([\d]+\.[\d]+\.[\d]+-(alpha|beta|rc)(\.\d+)?)/i
            ];

            let detectedVersion = null;
            for (const pattern of versionPatterns) {
              const match = issueBody.match(pattern);
              if (match) {
                detectedVersion = match[1].trim();
                break;
              }
            }

            if (detectedVersion) {
              console.log(`Detected version from issue: ${detectedVersion}`);
            } else {
              console.log('No version found in issue body, skipping version label');
            }

            core.setOutput('detected_version', detectedVersion);

      - name: Create version label if doesn't exist
        id: create-label
        if: steps.parse-version.outputs.detected_version != ''
        uses: ./.github/actions/versioning/create-version-label
        with:
          version: ${{ steps.parse-version.outputs.detected_version }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply version label to issue
        if: steps.parse-version.outputs.detected_version != ''
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const versionLabel = '${{ steps.create-label.outputs.label-name }}';

            console.log(`Applying label "${versionLabel}" to issue #${issueNumber}`);

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: [versionLabel]
              });

              console.log(`✅ Successfully labeled issue #${issueNumber} with "${versionLabel}"`);
            } catch (error) {
              console.error(`❌ Failed to label issue: ${error.message}`);
              core.setFailed(error.message);
            }

      - name: Summary
        if: always()
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          DETECTED_VERSION: ${{ steps.parse-version.outputs.detected_version }}
          LABEL_NAME: ${{ steps.create-label.outputs.label-name }}
          LABEL_CREATED: ${{ steps.create-label.outputs.label-created }}
        run: |
          echo "## Issue Auto-Tagging Summary"
          echo ""
          echo "- Issue: #$ISSUE_NUMBER"
          echo "- Title: $ISSUE_TITLE"
          echo "- Detected Version: $DETECTED_VERSION"
          if [ -n "$DETECTED_VERSION" ]; then
            echo "- Label Applied: $LABEL_NAME"
            echo "- Label Created: $LABEL_CREATED"
          else
            echo "- Label Applied: (none — version not specified in issue)"
          fi
