name: 🔍 PR Build & Hash Validation

# Related workflows (PR validation suite):
#   - pr-validation.yml (version, code style, changelog, title checks)
#   - pr-license-headers.yml (license header compliance)
#   - pr-build-hash-validation.yml (build hash integrity)
#   - pr-version-validation.yml (version consistency)
#   (pr-manifest-validation.yml was removed — manifest text uses {{NOTE_TEXT}} placeholder resolved at build time)
#   - ci-dotnet-tests.yml (.NET build and test)

# Description: Validates that PRs to main/dev/hotfix/release branches can build
# successfully and generate valid hash manifests without conflicts.

on:
  pull_request:
    branches:
      - main
      - dev
      - 'main-*'
      - 'dev-*'
      - 'hotfix/**'
      - 'release/**'
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to validate.
        required: false
        type: string
      base_ref:
        description: Pull request base branch.
        required: false
        type: string
      pr_title:
        description: Pull request title.
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Block manual edits to hash files - only GitHub Actions should generate these
  validate-no-manual-hash-edits:
    name: 🚫 Block Manual Hash Edits
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout PR Branch
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check for manual hash file edits
      shell: bash
      run: |
        echo "Checking for manual edits to hashes/ directory..."
        echo "Source of truth: main branch"
        echo ""

        # Fetch both the PR base branch (for computing changed files) and main (source of truth)
        BASE_REF="${{ github.event.inputs.base_ref || github.base_ref || github.event.merge_group.base_ref }}"
        git fetch origin "$BASE_REF" --depth=1
        git fetch origin main --depth=1

        # Get the list of changed files in the PR (relative to the PR base branch)
        changed_files=$(git diff --name-only "origin/$BASE_REF"..HEAD)

        echo "Changed files:"
        echo "$changed_files"
        echo ""

        # Check if any files in hashes/ were modified
        hash_files_changed=$(echo "$changed_files" | grep -E "^hashes/" || true)

        if [ -z "$hash_files_changed" ]; then
          echo "✅ No hash file edits detected."
          exit 0
        fi

        # For each changed hash file, compare its PR content with the main branch content.
        # Allowed case: file content exactly matches main (e.g. branch was updated from main
        # and carries the hash commit verbatim).
        # Blocked case: file content differs from main, or file does not exist on main.
        mismatched_files=()
        while IFS= read -r file; do
          [ -z "$file" ] && continue
          pr_hash=$(git rev-parse "HEAD:$file" 2>/dev/null || true)
          main_hash=$(git rev-parse "origin/main:$file" 2>/dev/null || true)

          if [ -z "$main_hash" ]; then
            echo "  ✗ $file: does not exist on main (new hash file not allowed)"
            mismatched_files+=("$file")
          elif [ "$pr_hash" != "$main_hash" ]; then
            echo "  ✗ $file: differs from main"
            mismatched_files+=("$file")
          else
            echo "  ✓ $file: matches main exactly (allowed)"
          fi
        done <<< "$hash_files_changed"

        echo ""
        if [ ${#mismatched_files[@]} -gt 0 ]; then
          echo "❌ ERROR: Manual edits detected to hash files!"
          echo ""
          echo "The following hash files differ from the main branch (source of truth):"
          for f in "${mismatched_files[@]}"; do
            echo "  - $f"
          done
          echo ""
          echo "🚫 Hash files MUST NOT be manually edited."
          echo ""
          echo "Hash manifests are automatically generated by GitHub Actions during the release process."
          echo "If you need to update hashes:"
          echo "  1. Revert your changes to the hashes/ directory to match main"
          echo "  2. The CI will generate and commit hash files automatically when needed"
          echo ""
          echo "If you believe this is an error, please contact the maintainers."
          exit 1
        fi

        echo "✅ Hash file changes match main exactly; allowed."

  # Windows-only prep step: generates SNK, updates InternalsVisibleTo in csproj files
  # This ensures the public key is embedded in source files before cross-platform compilation
  prep:
    needs: validate-no-manual-hash-edits
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '7.0.x'

    - name: Decode strong-name key
      shell: pwsh
      run: |
        if (-not (Test-Path signing.snk)) {
          if ("${{ secrets.SIGNING_SNK_BASE64 }}" -ne "") {
            Write-Host "Decoding signing.snk from Base64 secret"
            pwsh tools/Sign-StrongNames.ps1 -Base64 "${{ secrets.SIGNING_SNK_BASE64 }}"
          } else {
            Write-Host "Generating signing.snk"
            pwsh tools/Sign-StrongNames.ps1 -Generate
          }
        } else {
          Write-Host "signing.snk already exists"
        }

    - name: Update InternalsVisibleTo with public key
      shell: pwsh
      run: |
        Write-Host "Updating InternalsVisibleTo entries with public key from signing.snk"
        pwsh tools/Update-InternalsVisibleTo.ps1

    - name: Upload pre-processed source
      uses: actions/upload-artifact@v4
      with:
        name: preprocessed-source
        path: |
          src/**/*.csproj
          signing.snk
        retention-days: 1

  validate-build-and-hash:
    needs: [validate-no-manual-hash-edits, prep]
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: net7.0-windows
          - os: macos-latest
            platform: net7.0
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
    - name: Checkout PR Branch
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download pre-processed source
      uses: actions/download-artifact@v4
      with:
        name: preprocessed-source

    - name: Extract Version from Solution.props
      id: extract_version
      uses: ./.github/actions/versioning/get-version

    - name: Compile Solution and Collect Artifacts
      uses: ./.github/actions/compile-solution
      with:
        version: ${{ steps.extract_version.outputs.version }}
        configuration: Release
        platforms: '["${{ matrix.platform }}"]'
        signing-snk-base64: ${{ secrets.SIGNING_SNK_BASE64 }}
        libs-repo-pat: ${{ secrets.LIBS_REPO_PAT }}
        signing-pfx-base64: ${{ secrets.SIGNING_PFX_BASE64 }}
        signing-pfx-password: ${{ secrets.SIGNING_PFX_PASSWORD }}
        skip-internals-visible-to: 'true'
        output-directory: artifacts

    - name: Calculate Provider Hashes
      id: calculate_hashes
      uses: ./.github/actions/calculate-provider-hashes
      with:
        artifacts-path: artifacts
        version: ${{ steps.extract_version.outputs.version }}
        platforms: '["${{ matrix.platform }}"]'
        build-number: ${{ github.run_number }}
        commit-sha: ${{ github.sha }}
        repository: ${{ github.repository }}

    - name: Check for Hash File Conflicts
      id: check_conflicts
      shell: pwsh
      run: |
        $version = "${{ steps.extract_version.outputs.version }}"
        $hashFile = "${{ steps.calculate_hashes.outputs.HASH_FILE }}"
        
        # Checkout target branch to check for existing hash
        $targetBranch = "${{ github.base_ref || github.event.merge_group.base_ref }}"
        Write-Host "Checking target branch: $targetBranch"
        
        git fetch origin $targetBranch
        $hashesPath = ".github/pages/hashes/"
        $hashDirExists = git ls-tree --name-only "origin/$targetBranch" $hashesPath 2>$null
        $conflictDetected = $false

        if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace($hashDirExists)) {
          # Directory exists on remote - check it out and validate conflicts
          git checkout "origin/$targetBranch" -- $hashesPath 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Failed to checkout $hashesPath from origin/$targetBranch; cannot validate conflicts."
            $LASTEXITCODE = 0
            $conflictDetected = $false
          } else {
            # Successfully checked out - check for conflict
            $existingHashPath = "$hashesPath$version.json"
            if (Test-Path $existingHashPath) {
              $conflictDetected = $true
            }
          }
        } else {
          # Directory doesn't exist on remote - no conflicts possible
          Write-Host "Hash directory '$hashesPath' not present on origin/$targetBranch; no conflicts possible."
          $LASTEXITCODE = 0
          $conflictDetected = $false
        }
        
        if ($conflictDetected) {
          Write-Host "##[error] Hash file already exists for version $version!"
          Write-Host "##[error] File path: $existingHashPath"
          Write-Host ""
          Write-Host "Existing hash content:"
          Get-Content $existingHashPath
          Write-Host ""
          Write-Host "New hash content:"
          Get-Content $hashFile
          Write-Host ""
          echo "CONFLICT=true" >> $env:GITHUB_OUTPUT
          echo "CONFLICT_MESSAGE=Hash file for version $version already exists in target branch $targetBranch. You must increment the version in Solution.props." >> $env:GITHUB_OUTPUT
          exit 1
        } else {
          Write-Host "✅ No hash file conflict detected for version $version"
          echo "CONFLICT=false" >> $env:GITHUB_OUTPUT
        }

    - name: Validation Summary
      if: always()
      shell: pwsh
      run: |
        $version = "${{ steps.extract_version.outputs.version }}"
        $hashCount = "${{ steps.calculate_hashes.outputs.HASH_COUNT }}"
        $conflict = "${{ steps.check_conflicts.outputs.CONFLICT }}"
        $platform = "${{ matrix.platform }}"
        
        Write-Host ""
        Write-Host "=========================================="
        Write-Host "PR BUILD & HASH VALIDATION SUMMARY"
        Write-Host "=========================================="
        Write-Host "Platform: $platform"
        Write-Host "Version: $version"
        Write-Host "Providers Hashed: $hashCount"
        Write-Host "Hash Conflict: $(if ($conflict -eq 'true') { '❌ CONFLICT DETECTED' } else { '✅ No Conflict' })"
        Write-Host ""
        
        if ($conflict -eq "true") {
          Write-Host "##[error] ❌ VALIDATION FAILED: Hash file conflict detected!"
          Write-Host "##[error] Please increment the version in Solution.props"
          exit 1
        } else {
          Write-Host "##[notice] ✅ VALIDATION PASSED: Build successful and no hash conflicts"
        }

  required-check:
    name: 🔍 PR Build & Hash Validation
    needs: [validate-no-manual-hash-edits, prep, validate-build-and-hash]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Verify required workflow jobs
      shell: bash
      run: |
        if [[ "${{ needs.validate-no-manual-hash-edits.result }}" != "success" ]]; then
          echo "::error::Manual hash edit validation finished with ${{ needs.validate-no-manual-hash-edits.result }}"
          exit 1
        fi

        if [[ "${{ needs.prep.result }}" != "success" ]]; then
          echo "::error::Prep finished with ${{ needs.prep.result }}"
          exit 1
        fi

        if [[ "${{ needs.validate-build-and-hash.result }}" != "success" ]]; then
          echo "::error::Build/hash validation matrix finished with ${{ needs.validate-build-and-hash.result }}"
          exit 1
        fi
