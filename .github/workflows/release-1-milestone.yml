name: 🏁 1 Prepare Release Branch

# Related workflows (release pipeline — execute in numbered order):
#   - release-1-milestone.yml (creates milestone and branches)
#   - release-2-pr-to-dev-closed.yml (creates PR from dev→main on release merge)
#   - release-3-pr-to-main-closed.yml (creates GitHub Release on main merge)
#   - release-4-build.yml (builds platform artifacts on release publish)
#   - release-5-deploy-pages.yml (deploys documentation pages)
#   - release-6-upload-yak.yml (uploads to Yak package manager)

# Description: This workflow prepares a release branch for a specified version.
# It updates the version number and compiles release notes from all issues and 
# pull requests associated with the milestone.
#
# Triggers:
# - Manual dispatch from GitHub Actions page (specify version as input)
#
# Permissions:
# - contents:write - Required to create GitHub releases
# - issues:read - Required to read issue information for release notes
# - pull-requests:write - Required to create pull requests

permissions:
  actions: write
  contents: write
  issues: read
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      milestone-title:
        description: 'Milestone title (version number, e.g., 1.4.3 or 1.4.3-beta)'
        required: true
        type: string

concurrency:
  group: "release-${{ inputs.milestone-title }}"
  cancel-in-progress: false

jobs:
  release-preparation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Detect stabilization branch
        id: detect-branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const milestoneTitle = '${{ inputs.milestone-title }}';

            // Extract base version (strip suffix if present, e.g. "1.4.2-beta" → "1.4.2")
            const match = milestoneTitle.match(/^(\d+\.\d+\.\d+)/);
            if (!match) {
              console.log(`Cannot parse base version from '${milestoneTitle}'. Using default dev branch.`);
              core.setOutput('base-branch', 'dev');
              core.setOutput('is-stabilization', 'false');
              return;
            }
            const baseVersion = match[1];
            const devBranch = `dev-${baseVersion}`;

            // Check if the stabilization dev branch exists
            try {
              await github.rest.repos.getBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: devBranch
              });
              console.log(`Stabilization branch '${devBranch}' found. Using stabilization path.`);
              core.setOutput('base-branch', devBranch);
              core.setOutput('is-stabilization', 'true');
            } catch (e) {
              console.log(`No stabilization branch '${devBranch}' found. Using default dev branch.`);
              core.setOutput('base-branch', 'dev');
              core.setOutput('is-stabilization', 'false');
            }

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.detect-branch.outputs.base-branch }}

      - name: Set up Git user
        run: |
          git config user.name "${{ vars.SMARTHOPPER_BOT_NAME }}"
          git config user.email "${{ vars.SMARTHOPPER_BOT_EMAIL }}"

      - name: Remove existing release branch if it exists
        run: |
          if git ls-remote --exit-code --heads origin release/${{ inputs.milestone-title }}; then
            git push origin --delete release/${{ inputs.milestone-title }}
          fi

      - name: Create release branch
        run: git checkout -b release/${{ inputs.milestone-title }}

      # The release content is taken from the (possibly stale) stabilization
      # branch, but the composite actions used below must match THIS workflow
      # definition, which runs from the dispatched ref. When CI tooling has been
      # refactored on dev/main after a stabilization branch was cut (e.g. the
      # `update-version` → `version-manager` consolidation), the checked-out base
      # branch would not contain the referenced local action, breaking the run.
      # Sync `.github/actions` from the workflow ref so `uses: ./...` always
      # resolves the expected versions. These files are CI-only and are never
      # staged by the commit step below, so release content is unaffected.
      - name: Check out CI tooling from workflow ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          path: .ci-tooling
          fetch-depth: 1
      - name: Sync composite actions from workflow ref
        run: |
          rm -rf .github/actions
          cp -R .ci-tooling/.github/actions .github/actions
          rm -rf .ci-tooling

      - name: Replace SmartHopperPublicKey with placeholder
        run: |
          csproj="src/SmartHopper.Infrastructure/SmartHopper.Infrastructure.csproj"
          placeholder="This value is automatically replaced by the build tooling before official builds."
          if [ -f "$csproj" ]; then
            if grep -q "<SmartHopperPublicKey>" "$csproj"; then
              sed -i "s#<SmartHopperPublicKey>.*</SmartHopperPublicKey>#<SmartHopperPublicKey>${placeholder}</SmartHopperPublicKey>#" "$csproj"
            else
              echo "SmartHopperPublicKey property not found in $csproj"
            fi
          else
            echo "File not found: $csproj" >&2
            exit 1
          fi

      - name: Update version
        uses: ./.github/actions/versioning/version-manager
        with:
          mode: set-version
          new-version: ${{ inputs.milestone-title }}

      - name: Update manifest text for release version
        uses: ./.github/actions/versioning/update-manifest-text
        with:
          version: ${{ inputs.milestone-title }}
          manifest-path: yak-package/manifest.yml
          update-file: 'true'

      - name: Include missing issues in changelog
        uses: ./.github/actions/documentation/update-changelog-issues
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          days-lookback: 90

      - name: Update changelog section
        uses: ./.github/actions/documentation/update-changelog
        with:
          action: create-release
          version: ${{ inputs.milestone-title }}
      - name: Update Ready badge to YES (brightgreen)
        uses: ./.github/actions/documentation/update-ready-badge
        with:
          status: YES
          color: brightgreen
          file: README.md

      - name: Normalize LGPL license headers
        shell: pwsh
        run: |
          & .\tools\Update-LicenseHeaders.ps1

      # - name: Fix code style
      #   uses: ./.github/actions/code-style
      #   with:
      #     mode: fix
      #     commit: false
      #     bot-name: ${{ vars.SMARTHOPPER_BOT_NAME }}
      #     bot-email: ${{ vars.SMARTHOPPER_BOT_EMAIL }}
      
      - name: Commit and push changes
        run: |
          git add Solution.props CHANGELOG.md README.md yak-package/manifest.yml src/SmartHopper.Infrastructure/SmartHopper.Infrastructure.csproj src/
          git commit -m "chore: prepare release ${{ inputs.milestone-title }} with version update and code style fixes"
          git push origin release/${{ inputs.milestone-title }}

      - name: Create Pull Request
        id: create-pr
        run: |
          BASE_BRANCH="${{ steps.detect-branch.outputs.base-branch }}"
          gh pr create \
            --base "$BASE_BRANCH" \
            --head release/${{ inputs.milestone-title }} \
            --title "chore: prepare release ${{ inputs.milestone-title }} with version update and code style fixes" \
            --body $'This PR prepares the release for version ${{ inputs.milestone-title }} with version update and code style fixes:\n\n- Updated version in Solution.props\n- Updated changelog with closed-solved issues\n- Updated README badges' 2>&1 || true
          
          # Capture PR number (works whether PR was just created or already existed)
          PR_NUMBER=$(gh pr list --base "$BASE_BRANCH" --head release/${{ inputs.milestone-title }} --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::Failed to create or find release PR"
            exit 1
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Assign PR to Milestone
        if: steps.create-pr.outputs.pr_number != ''
        uses: ./.github/actions/milestone/assign-pr
        with:
          pr-number: ${{ steps.create-pr.outputs.pr_number }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch required PR checks
        if: steps.create-pr.outputs.pr_number != ''
        uses: ./.github/actions/dispatch-required-pr-checks
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: release/${{ inputs.milestone-title }}
          pr-number: ${{ steps.create-pr.outputs.pr_number }}
          base-ref: ${{ steps.detect-branch.outputs.base-branch }}
          pr-title: "chore: prepare release ${{ inputs.milestone-title }} with version update and code style fixes"

  notify-on-failure:
    needs: [release-preparation]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🔴 release-1 (Prepare Release) failed for ${context.payload.inputs?.['milestone-title'] || 'unknown'} (run #${context.runNumber})`;
            const body = [
              `The **Prepare Release Branch** workflow failed.`,
              ``,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Milestone:** \`${context.payload.inputs?.['milestone-title'] || 'unknown'}\``,
              `**Triggered by:** ${context.actor}`,
              ``,
              `This is a critical release pipeline failure. Please investigate immediately.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['automated', 'status: needs attention'],
            });
