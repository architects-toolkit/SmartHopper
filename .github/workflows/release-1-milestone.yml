name: 🏁 1 Prepare Release Branch

# Description: This workflow prepares a release branch for a specified version.
# It updates the version number and compiles release notes from all issues and 
# pull requests associated with the milestone.
#
# Triggers:
# - Manual dispatch from GitHub Actions page (specify version as input)
#
# Permissions:
# - contents:write - Required to create GitHub releases
# - issues:read - Required to read issue information for release notes
# - pull-requests:write - Required to create pull requests

permissions:
  contents: write
  issues: read
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      milestone-title:
        description: 'Milestone title (version number, e.g., 1.4.3 or 1.4.3-beta)'
        required: true
        type: string

jobs:
  release-preparation:
    runs-on: ubuntu-latest
    steps:
      - name: Detect stabilization branch
        id: detect-branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const milestoneTitle = '${{ inputs.milestone-title }}';

            // Extract base version (strip suffix if present, e.g. "1.4.2-beta" → "1.4.2")
            const match = milestoneTitle.match(/^(\d+\.\d+\.\d+)/);
            if (!match) {
              console.log(`Cannot parse base version from '${milestoneTitle}'. Using default dev branch.`);
              core.setOutput('base-branch', 'dev');
              core.setOutput('is-stabilization', 'false');
              return;
            }
            const baseVersion = match[1];
            const devBranch = `dev-${baseVersion}`;

            // Check if the stabilization dev branch exists
            try {
              await github.rest.repos.getBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: devBranch
              });
              console.log(`Stabilization branch '${devBranch}' found. Using stabilization path.`);
              core.setOutput('base-branch', devBranch);
              core.setOutput('is-stabilization', 'true');
            } catch (e) {
              console.log(`No stabilization branch '${devBranch}' found. Using default dev branch.`);
              core.setOutput('base-branch', 'dev');
              core.setOutput('is-stabilization', 'false');
            }

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.detect-branch.outputs.base-branch }}

      - name: Set up Git user
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"

      - name: Remove existing release branch if it exists
        run: |
          if git ls-remote --exit-code --heads origin release/${{ inputs.milestone-title }}; then
            git push origin --delete release/${{ inputs.milestone-title }}
          fi

      - name: Create release branch
        run: git checkout -b release/${{ inputs.milestone-title }}

      - name: Replace SmartHopperPublicKey with placeholder
        run: |
          csproj="src/SmartHopper.Infrastructure/SmartHopper.Infrastructure.csproj"
          placeholder="This value is automatically replaced by the build tooling before official builds."
          if [ -f "$csproj" ]; then
            if grep -q "<SmartHopperPublicKey>" "$csproj"; then
              sed -i "s#<SmartHopperPublicKey>.*</SmartHopperPublicKey>#<SmartHopperPublicKey>${placeholder}</SmartHopperPublicKey>#" "$csproj"
            else
              echo "SmartHopperPublicKey property not found in $csproj"
            fi
          else
            echo "File not found: $csproj" >&2
            exit 1
          fi

      - name: Update version in Solution.props
        uses: ./.github/actions/versioning/update-version
        with:
          new-version: ${{ inputs.milestone-title }}

      - name: Include missing issues in changelog
        uses: ./.github/actions/documentation/update-changelog-issues
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          days-lookback: 90

      - name: Update changelog section
        uses: ./.github/actions/documentation/update-changelog
        with:
          action: create-release
          version: ${{ inputs.milestone-title }}
          
      - name: Update README badges
        uses: ./.github/actions/documentation/update-badges
        id: update-badges

      - name: Update Ready badge to YES (brightgreen)
        uses: ./.github/actions/documentation/update-ready-badge
        with:
          status: YES
          color: brightgreen
          file: README.md

      - name: Normalize LGPL license headers
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File .\tools\Update-LicenseHeaders.ps1

      # - name: Fix code style
      #   uses: ./.github/actions/code-style
      #   with:
      #     mode: fix
      #     commit: false
      
      - name: Commit and push changes
        run: |
          git add Solution.props CHANGELOG.md README.md src/SmartHopper.Infrastructure/SmartHopper.Infrastructure.csproj src/
          git commit -m "chore: prepare release ${{ inputs.milestone-title }} with version update and code style fixes"
          git push origin release/${{ inputs.milestone-title }}

      - name: Create Pull Request
        id: create-pr
        run: |
          BASE_BRANCH="${{ steps.detect-branch.outputs.base-branch }}"
          gh pr create \
            --base "$BASE_BRANCH" \
            --head release/${{ inputs.milestone-title }} \
            --title "chore: prepare release ${{ inputs.milestone-title }} with version update and code style fixes" \
            --body $'This PR prepares the release for version ${{ inputs.milestone-title }} with version update and code style fixes:\n\n- Updated version in Solution.props\n- Updated changelog with closed-solved issues\n- Updated README badges'
          
          # Capture PR number
          PR_NUMBER=$(gh pr list --base "$BASE_BRANCH" --head release/${{ inputs.milestone-title }} --json number --jq '.[0].number')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Assign PR to Milestone
        if: steps.create-pr.outputs.pr_number != ''
        uses: ./.github/actions/milestone/assign-pr
        with:
          pr-number: ${{ steps.create-pr.outputs.pr_number }}
          token: ${{ secrets.GITHUB_TOKEN }}