name: 🏁 4 Build Project (Dual Platform)

# Related workflows (release pipeline — execute in numbered order):
#   - release-1-milestone.yml (creates milestone and branches)
#   - release-2-pr-to-dev-closed.yml (creates PR from dev→main on release merge)
#   - release-3-pr-to-main-closed.yml (creates GitHub Release on main merge)
#   - release-4-build.yml (builds platform artifacts on release publish)
#   - release-5-deploy-pages.yml (deploys documentation pages)
#   - release-6-upload-yak.yml (uploads to Yak package manager)

# Description: This workflow builds the project on both Windows and macOS runners
# to ensure native compilation and accurate SHA-256 hash generation for each platform.
# 
# Flow:
# 1. Prep job runs on Windows to execute Windows-only operations (Update InternalsVisibleTo, SNK generation)
# 2. Build jobs run on both Windows and macOS, downloading pre-processed source from prep job
# 3. Hash manifests are merged and artifacts uploaded
#
# Triggers:
# - Manually via workflow_dispatch
# - Automatically when a release is published (excluding drafts)
#
# Permissions:
# - contents:read - Required to read repository content for building
# - contents:write - Required to upload assets to releases
# - pages:write - Required to deploy to GitHub Pages
# - id-token:write - Required for GitHub Pages OIDC authentication

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (using the latest release tag if empty)'
        required: false
        default: ''
      upload_to_release:
        description: 'Upload artifacts to the corresponding release'
        type: boolean
        default: false
  release:
    types: [published]

permissions:
  actions: write
  contents: write
  issues: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-build-${{ github.event.release.tag_name || inputs.version || github.run_id }}
  cancel-in-progress: false

jobs:
  # Job 1: Windows-only prep step - generates SNK, updates InternalsVisibleTo in csproj files
  # This ensures the public key is embedded in source files before cross-platform compilation
  prep:
    runs-on: windows-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.determine_version.outputs.VERSION }}
      is_release: ${{ steps.determine_version.outputs.IS_RELEASE }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for all tags and branches
    
    - name: Get latest release tag
      id: get_latest_release
      shell: pwsh
      run: |
        # Get all tags and sort them by version number
        $tags = git tag -l --sort=-v:refname
        if (-not $tags) {
          # Fail if no tags exist
          Write-Host "##[error] No tags found in the repository."
          exit 1
        }
        
        # Get the latest tag (first in sorted list)
        $latestTag = $tags[0]
        Write-Host "Latest tag: $latestTag"
        echo "LATEST_TAG=$latestTag" >> $env:GITHUB_OUTPUT
    
    - name: Determine version to build
      id: determine_version
      shell: pwsh
      run: |
        $inputVersion = "${{ github.event.inputs.version }}"
        $releaseTag = "${{ github.event.release.tag_name }}"
        $latestTag = "${{ steps.get_latest_release.outputs.LATEST_TAG }}"
        
        # Determine which version to use
        if ($releaseTag) {
          # If triggered by a release event
          $version = $releaseTag
          $isRelease = "true"
        } elseif ($inputVersion) {
          # If manually triggered with a specific version
          $version = $inputVersion
          $isRelease = "${{ github.event.inputs.upload_to_release }}"
        } else {
          # Default to latest tag if no version specified
          $version = $latestTag
          $isRelease = "${{ github.event.inputs.upload_to_release }}"
        }
        
        Write-Host "Building version: $version"
        Write-Host "Is release build: $isRelease"
        
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "IS_RELEASE=$isRelease" >> $env:GITHUB_OUTPUT
        
        # Checkout the tag that matches the version
        git checkout $version
        if ($LASTEXITCODE -ne 0) {
          Write-Host "##[error] Failed to checkout tag $version"
          exit 1
        }
    
    - name: Create version label if doesn't exist
      if: github.event_name == 'release' || github.event.inputs.upload_to_release == 'true'
      uses: ./.github/actions/versioning/create-version-label
      with:
        version: ${{ steps.determine_version.outputs.VERSION }}
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Check if release is draft
      if: github.event_name == 'release'
      id: check_draft
      shell: pwsh
      run: |
        $isDraft = "${{ github.event.release.draft }}"
        echo "IS_DRAFT=$isDraft" >> $env:GITHUB_OUTPUT
      
    - name: Exit if release is draft
      if: github.event_name == 'release' && steps.check_draft.outputs.IS_DRAFT == 'true'
      shell: pwsh
      run: |
        Write-Host "This is a draft release. Skipping build."
        exit 0

    - name: Decode strong-name key
      shell: pwsh
      run: |
        if (-not (Test-Path signing.snk)) {
          if ("${{ secrets.SIGNING_SNK_BASE64 }}" -ne "") {
            Write-Host "Decoding signing.snk from Base64 secret"
            pwsh tools/Sign-StrongNames.ps1 -Base64 "${{ secrets.SIGNING_SNK_BASE64 }}"
          } else {
            Write-Host "Generating signing.snk"
            pwsh tools/Sign-StrongNames.ps1 -Generate
          }
        } else {
          Write-Host "signing.snk already exists"
        }

    - name: Update InternalsVisibleTo with public key
      shell: pwsh
      run: |
        Write-Host "Updating InternalsVisibleTo entries with public key from signing.snk"
        pwsh tools/Update-InternalsVisibleTo.ps1

    - name: Upload pre-processed source
      uses: actions/upload-artifact@v4
      with:
        name: preprocessed-source-release
        path: |
          src/**/*.csproj
          signing.snk
        retention-days: 1

  # Build on Windows for net7.0-windows platform
  build-windows:
    needs: prep
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ needs.prep.outputs.version }}
    
    - name: Download pre-processed source
      uses: actions/download-artifact@v4
      with:
        name: preprocessed-source-release

    - name: Compile Solution (Windows)
      uses: ./.github/actions/compile-solution
      with:
        version: ${{ needs.prep.outputs.version }}
        configuration: Release
        platforms: '["net7.0-windows"]'
        signing-snk-base64: ${{ secrets.SIGNING_SNK_BASE64 }}
        libs-repo-pat: ${{ secrets.LIBS_REPO_PAT }}
        signing-pfx-base64: ${{ secrets.SIGNING_PFX_BASE64 }}
        signing-pfx-password: ${{ secrets.SIGNING_PFX_PASSWORD }}
        skip-internals-visible-to: 'true'
        output-directory: artifacts-windows

    - name: Calculate Windows Provider Hashes
      id: calculate_hashes_windows
      uses: ./.github/actions/calculate-provider-hashes
      with:
        artifacts-path: artifacts-windows
        version: ${{ needs.prep.outputs.version }}
        platforms: '["net7.0-windows"]'
        build-number: ${{ github.run_number }}
        commit-sha: ${{ github.sha }}
        repository: ${{ github.repository }}

    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: |
          artifacts-windows/
          ${{ steps.calculate_hashes_windows.outputs.HASH_FILE }}

  # Build on macOS for net7.0 platform
  build-macos:
    needs: prep
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ needs.prep.outputs.version }}
    
    - name: Download pre-processed source
      uses: actions/download-artifact@v4
      with:
        name: preprocessed-source-release

    - name: Compile Solution (macOS)
      uses: ./.github/actions/compile-solution
      with:
        version: ${{ needs.prep.outputs.version }}
        configuration: Release
        platforms: '["net7.0"]'
        signing-snk-base64: ${{ secrets.SIGNING_SNK_BASE64 }}
        libs-repo-pat: ${{ secrets.LIBS_REPO_PAT }}
        skip-internals-visible-to: 'true'
        output-directory: artifacts-macos

    - name: Calculate macOS Provider Hashes
      id: calculate_hashes_macos
      uses: ./.github/actions/calculate-provider-hashes
      with:
        artifacts-path: artifacts-macos
        version: ${{ needs.prep.outputs.version }}
        platforms: '["net7.0"]'
        build-number: ${{ github.run_number }}
        commit-sha: ${{ github.sha }}
        repository: ${{ github.repository }}

    - name: Upload macOS Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-build
        path: |
          artifacts-macos/
          ${{ steps.calculate_hashes_macos.outputs.HASH_FILE }}

  # Merge artifacts and hash manifests
  merge-and-release:
    needs: [prep, build-windows, build-macos]
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download Windows Artifacts
      uses: actions/download-artifact@v4
      with:
        name: windows-build
        path: windows-build

    - name: Download macOS Artifacts
      uses: actions/download-artifact@v4
      with:
        name: macos-build
        path: macos-build

    - name: Merge Artifacts
      shell: pwsh
      run: |
        $version = "${{ needs.prep.outputs.version }}"
        
        Write-Host "Merging artifacts for version: $version"
        
        # Create merged artifacts directory
        New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null
        
        # Copy Windows artifacts
        if (Test-Path "windows-build/artifacts-windows/net7.0-windows") {
          Copy-Item -Path "windows-build/artifacts-windows/net7.0-windows" -Destination "artifacts/" -Recurse -Force
          Write-Host "Copied Windows artifacts"
        }
        
        # Copy macOS artifacts
        if (Test-Path "macos-build/artifacts-macos/net7.0") {
          Copy-Item -Path "macos-build/artifacts-macos/net7.0" -Destination "artifacts/" -Recurse -Force
          Write-Host "Copied macOS artifacts"
        }

    - name: Merge Hash Manifests
      id: merge_hashes
      shell: pwsh
      run: |
        $version = "${{ needs.prep.outputs.version }}"
        
        # Find hash files
        $windowsHashFile = Get-ChildItem -Path "windows-build" -Filter "provider-hashes-*.json" -Recurse | Select-Object -First 1
        $macosHashFile = Get-ChildItem -Path "macos-build" -Filter "provider-hashes-*.json" -Recurse | Select-Object -First 1
        
        if (-not $windowsHashFile -or -not $macosHashFile) {
          Write-Host "##[error] Could not find hash files"
          exit 1
        }
        
        Write-Host "Windows hash file: $($windowsHashFile.FullName)"
        Write-Host "macOS hash file: $($macosHashFile.FullName)"
        
        # Load hash manifests
        $windowsHashes = Get-Content $windowsHashFile.FullName -Raw | ConvertFrom-Json
        $macosHashes = Get-Content $macosHashFile.FullName -Raw | ConvertFrom-Json
        
        # Merge providers
        $mergedProviders = @{}
        foreach ($key in $windowsHashes.providers.PSObject.Properties.Name) {
          $mergedProviders[$key] = $windowsHashes.providers.$key
        }
        foreach ($key in $macosHashes.providers.PSObject.Properties.Name) {
          $mergedProviders[$key] = $macosHashes.providers.$key
        }
        
        # Create merged manifest
        $mergedManifest = @{
          version = $version
          generated = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          algorithm = "SHA-256"
          providers = $mergedProviders
          metadata = @{
            buildNumber = "${{ github.run_number }}"
            commitSha = "${{ github.sha }}"
            repository = "${{ github.repository }}"
            platforms = @("net7.0-windows", "net7.0")
          }
        }
        
        # Save merged manifest
        $outputFile = "SmartHopper-Provider-Integrity-Hashes-$version.json"
        $mergedManifest | ConvertTo-Json -Depth 10 | Set-Content $outputFile
        
        Write-Host "Merged hash manifest created: $outputFile"
        Write-Host "Total providers: $($mergedProviders.Count)"
        
        echo "HASH_FILE=$outputFile" >> $env:GITHUB_OUTPUT
        echo "HASH_COUNT=$($mergedProviders.Count)" >> $env:GITHUB_OUTPUT

    - name: Create ZIP Archives
      if: needs.prep.outputs.is_release == 'true'
      shell: pwsh
      run: |
        $version = "${{ needs.prep.outputs.version }}"
        
        # Create Windows ZIP
        if (Test-Path "artifacts/net7.0-windows") {
          $zipName = "SmartHopper-$version-Rhino8-Windows.zip"
          Compress-Archive -Path "artifacts/net7.0-windows/*" -DestinationPath $zipName -Force
          Write-Host "Created: $zipName"
        }
        
        # Create macOS ZIP
        if (Test-Path "artifacts/net7.0") {
          $zipName = "SmartHopper-$version-Rhino8-Mac.zip"
          Compress-Archive -Path "artifacts/net7.0/*" -DestinationPath $zipName -Force
          Write-Host "Created: $zipName"
        }

    - name: Commit Hash File to Repository
      if: needs.prep.outputs.is_release == 'true'
      shell: pwsh
      run: |
        $version = "${{ needs.prep.outputs.version }}"
        $hashFile = "${{ steps.merge_hashes.outputs.HASH_FILE }}"
        
        Write-Host "Committing hash file to repository..."
        Write-Host "  Version: $version"
        Write-Host "  Hash file: $hashFile"
        
        # Create hashes directory if it doesn't exist
        if (!(Test-Path "hashes")) {
          New-Item -ItemType Directory -Force -Path "hashes" | Out-Null
          Write-Host "Created /hashes directory"
        }
        
        # Copy hash file to /hashes/{version}.json
        $destPath = "hashes/$version.json"
        Copy-Item $hashFile -Destination $destPath -Force
        Write-Host "Copied hash file to: $destPath"
        
        # Configure git
        git config user.name "${{ vars.SMARTHOPPER_BOT_NAME }}"
        git config user.email "${{ vars.SMARTHOPPER_BOT_EMAIL }}"
        
        # Fetch main branch
        git fetch origin main
        
        # Create a temporary branch from main
        $tempBranch = "hash-update/$version-${{ github.run_number }}"
        git checkout -b $tempBranch origin/main
        
        # Copy the hash file
        if (!(Test-Path "hashes")) {
          New-Item -ItemType Directory -Force -Path "hashes" | Out-Null
        }
        Copy-Item $hashFile -Destination $destPath -Force
        
        # Commit and push
        git add hashes/$version.json
        if (git diff --staged --quiet) {
          Write-Host "No changes to commit (hash file already exists with same content)"
        } else {
          git commit -m "chore: add provider hash manifest for version $version (dual platform)"
          git push origin $tempBranch
          
          # Create PR to main
          Write-Host "Creating PR to merge hash file to main..."
          $prBody = "Auto-generated PR to add provider hash manifest for version $version (native builds on Windows and macOS).`n`n**Hash File:** \`hashes/$version.json\``n**Build:** #${{ github.run_number }}`n**Platforms:** net7.0-windows (Windows runner), net7.0 (macOS runner)"
          
          gh pr create --base main --head $tempBranch --title "chore: add provider hash manifest for $version" --body $prBody 2>&1 | Out-Default
          if ($LASTEXITCODE -ne 0) { Write-Host "gh pr create exited $LASTEXITCODE (PR may already exist)" }
          
          # Capture PR number (works whether PR was just created or already existed)
          $prNumber = gh pr list --head $tempBranch --json number --jq '.[0].number'
          if (-not $prNumber) {
            Write-Error "Failed to create or find hash PR"
            exit 1
          }
          echo "hash_pr_number=$prNumber" >> $env:GITHUB_OUTPUT
        }
      id: hash-pr
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Assign Hash PR to Milestone
      if: needs.prep.outputs.is_release == 'true' && steps.hash-pr.outputs.hash_pr_number != ''
      uses: ./.github/actions/milestone/assign-pr
      with:
        pr-number: ${{ steps.hash-pr.outputs.hash_pr_number }}
        token: ${{ secrets.GITHUB_TOKEN }}
        version: ${{ needs.prep.outputs.version }}

    - name: Dispatch required PR checks for hash PR
      if: needs.prep.outputs.is_release == 'true' && steps.hash-pr.outputs.hash_pr_number != ''
      uses: ./.github/actions/dispatch-required-pr-checks
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: hash-update/${{ needs.prep.outputs.version }}-${{ github.run_number }}
        pr-number: ${{ steps.hash-pr.outputs.hash_pr_number }}
        base-ref: main
        pr-title: "chore: add provider hash manifest for ${{ needs.prep.outputs.version }}"

    - name: Auto-merge Hash PR
      if: needs.prep.outputs.is_release == 'true' && steps.hash-pr.outputs.hash_pr_number != ''
      shell: pwsh
      run: |
        $prNumber = "${{ steps.hash-pr.outputs.hash_pr_number }}"
        if ($prNumber) {
          gh pr merge $prNumber --auto --rebase
        }
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Hash Manifest
      uses: actions/upload-artifact@v4
      with:
        name: provider-hashes
        path: ${{ steps.merge_hashes.outputs.HASH_FILE }}

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: plugin-package
        path: artifacts/

    - name: Upload Release Assets
      if: needs.prep.outputs.is_release == 'true'
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ needs.prep.outputs.version }}
        files: |
          SmartHopper-${{ needs.prep.outputs.version }}-Rhino8-Windows.zip
          SmartHopper-${{ needs.prep.outputs.version }}-Rhino8-Mac.zip
          ${{ steps.merge_hashes.outputs.HASH_FILE }}

    - name: Workflow Complete
      if: needs.prep.outputs.is_release == 'true'
      shell: pwsh
      run: |
        Write-Host "✓ Dual-platform build workflow complete"
        Write-Host ""
        Write-Host "Platforms built:"
        Write-Host "  - net7.0-windows (Windows runner)"
        Write-Host "  - net7.0 (macOS runner)"
        Write-Host ""
        Write-Host "Next steps:"
        Write-Host "  1. Review and merge the hash PR to main branch"
        Write-Host "  2. GitHub Pages deployment will trigger automatically"

  # Trigger Yak upload after build succeeds — only for stable (non-prerelease) releases
  # This replaces the standalone release-auto-upload-yak.yml trigger to avoid a race condition
  # where Yak upload fires before build artifacts are ready.
  trigger-yak-upload:
    needs: [merge-and-release]
    if: github.event_name == 'release' && !github.event.release.prerelease
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: write
      contents: read
    steps:
      - name: Trigger Yak upload workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = '${{ github.event.release.tag_name }}';
            const releaseVersion = tag.replace(/^v/, '');

            console.log(`Build succeeded. Triggering Yak upload for stable release: ${releaseVersion}`);

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release-6-upload-yak.yml',
              ref: 'main',
              inputs: {
                version: releaseVersion,
                platform: 'both',
                upload_to_yak: 'true',
                testing: 'false'
              }
            });

            console.log('✅ Yak upload workflow triggered successfully');
