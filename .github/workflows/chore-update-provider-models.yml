name: 🔄 Update Provider Models

# Related workflows (provider model management):
#   - check-provider-models.yml (validates model definitions in PRs)
#   - chore-update-provider-models.yml (fetches and updates model lists)
#   - chore-update-model-verification-template.yml (updates issue template)
#   - model-verification.yml (community model verification process)

# Description: Scheduled CI that queries OpenRouter's unified /models endpoint as the
# single source of truth, then updates each provider's *ProviderModels.cs file.
# Auto-inserts new models with capabilities mapped from OpenRouter metadata
# (architecture.modalities, supported_parameters, context_length), marks models
# with expiration_date < 1 year as deprecated, and flags disappeared models.
#
# Triggers:
#   - workflow_dispatch: manual run with optional provider filter
#   - schedule: every Sunday 5:00 UTC

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:
    inputs:
      provider_filter:
        description: 'Comma-separated provider(s) to process (empty = all)'
        required: false
        default: ''

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  fetch-and-update:
    name: ${{ matrix.provider }}
    runs-on: windows-latest
    timeout-minutes: 45
    concurrency:
      group: provider-models-${{ matrix.provider }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: OpenAI
          - provider: MistralAI
          - provider: Anthropic
          - provider: OpenRouter
          - provider: DeepSeek
    steps:
      - name: Skip if secret is absent or filtered out
        id: check
        shell: bash
        env:
          API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FILTER: ${{ github.event.inputs.provider_filter || '' }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "Secret OPENROUTER_API_KEY is not configured. Skipping ${{ matrix.provider }}."
          elif [ -n "$FILTER" ]; then
            normalized="${FILTER// /}"
            if [[ ",${normalized}," != *",${{ matrix.provider }},"* ]]; then
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              echo "Provider ${{ matrix.provider }} not in filter '$FILTER'. Skipping."
            else
              echo "skipped=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout main
        if: steps.check.outputs.skipped == 'false'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Fetch and compare models for ${{ matrix.provider }}
        if: steps.check.outputs.skipped == 'false'
        id: models
        uses: ./.github/actions/ai/fetch-models
        with:
          provider: ${{ matrix.provider }}
          api-key: ${{ secrets.OPENROUTER_API_KEY }}
          provider-api-key: ${{ (matrix.provider == 'OpenAI' && secrets.OPENAI_API_KEY) || (matrix.provider == 'MistralAI' && secrets.MISTRAL_API_KEY) || (matrix.provider == 'Anthropic' && secrets.ANTHROPIC_API_KEY) || (matrix.provider == 'DeepSeek' && secrets.DEEPSEEK_API_KEY) || '' }}
          update-file: true
          # Don't fail the scheduled job on validation errors. New models picked
          # up from OpenRouter often arrive with incomplete metadata (no input
          # modalities, no supported_parameters), which maps to
          # `AICapability.None` and trips the validator. Failing the workflow in
          # that case hides the new models entirely — no PR is opened, the file
          # changes are discarded, and the maintainer never sees what needs to
          # be reviewed. Instead, let validation issues flow into the PR body so
          # the maintainer can complete the metadata before merging. The PR-level
          # `check-provider-models.yml` job still enforces validation on the PR.
          fail-on-validation-errors: false

      - name: Compute validation summary
        if: steps.check.outputs.skipped == 'false' && steps.models.outputs.success == 'true'
        id: validation
        shell: pwsh
        env:
          REPORT_JSON: ${{ steps.models.outputs.report }}
        run: |
          $ErrorActionPreference = 'Stop'
          $report = $env:REPORT_JSON | ConvertFrom-Json

          $hasIssues = $false
          $summaryLines = [System.Collections.Generic.List[string]]::new()

          if ($report.validation -and -not $report.validation.success) {
            $hasIssues = $true
            $summaryLines.Add('### Validation issues — manual review required')
            $summaryLines.Add('')

            if ($report.validation.missingDefaultCapabilities.Count -gt 0) {
              $summaryLines.Add('**Missing default capabilities:**')
              foreach ($capability in $report.validation.missingDefaultCapabilities) {
                $summaryLines.Add("- ``AICapability.$capability``")
              }
              $summaryLines.Add('')
            }

            if ($report.validation.pendingCapabilityModels.Count -gt 0) {
              $summaryLines.Add('**Models with pending capability definitions:**')
              foreach ($model in $report.validation.pendingCapabilityModels) {
                $summaryLines.Add("- ``$model``")
              }
              $summaryLines.Add('')
            }

            if ($report.validation.realtimeModels.Count -gt 0) {
              $summaryLines.Add('**Realtime models (should be excluded):**')
              foreach ($model in $report.validation.realtimeModels) {
                $summaryLines.Add("- ``$model``")
              }
              $summaryLines.Add('')
            }
          }

          $body = ($summaryLines -join "`n")

          "has-issues=$($hasIssues.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          "body<<EOF_BODY" >> $env:GITHUB_OUTPUT
          "$body" >> $env:GITHUB_OUTPUT
          "EOF_BODY" >> $env:GITHUB_OUTPUT

      - name: Emit step summary
        if: steps.check.outputs.skipped == 'false' && steps.models.outputs.success == 'true'
        shell: pwsh
        env:
          REPORT_JSON: ${{ steps.models.outputs.report }}
          VALIDATION_BODY: ${{ steps.validation.outputs.body }}
        run: |
          $report = $env:REPORT_JSON | ConvertFrom-Json
          Write-Output "## ${{ matrix.provider }} model scan" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "- API models: $($report.apiModels.Count)" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "- Source models: $($report.sourceModels.Count)" >> $env:GITHUB_STEP_SUMMARY
          if ($report.newModels.Count -gt 0) {
            Write-Output "- **New models:** ``$($report.newModels -join ', ')``" >> $env:GITHUB_STEP_SUMMARY
          }
          if ($report.deprecatedModels.Count -gt 0) {
            Write-Output "- **Deprecated models:** ``$($report.deprecatedModels -join ', ')``" >> $env:GITHUB_STEP_SUMMARY
          }
          if (-not [string]::IsNullOrWhiteSpace($env:VALIDATION_BODY)) {
            Write-Output "" >> $env:GITHUB_STEP_SUMMARY
            Write-Output $env:VALIDATION_BODY >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Emit no-changes summary
        if: steps.check.outputs.skipped == 'false' && steps.models.outputs.success == 'true' && steps.models.outputs.changed == 'false'
        shell: pwsh
        run: |
          Write-Output "## ${{ matrix.provider }} model scan" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "- API models: $($env:MODEL_COUNT)" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "- **No changes** detected in source file; no PR created." >> $env:GITHUB_STEP_SUMMARY
        env:
          MODEL_COUNT: ${{ steps.models.outputs.count }}

      - name: Create Pull Request
        if: steps.check.outputs.skipped == 'false' && steps.models.outputs.changed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(models): update ${{ matrix.provider }} model list"
          title: "chore(models): auto-add new and deprecate stale ${{ matrix.provider }} models"
          body: |
            Auto-generated PR from `.github/workflows/chore-update-provider-models.yml`.

            ${{ steps.validation.outputs.body }}

            ### Scan results for `${{ matrix.provider }}`
            ````json
            ${{ steps.models.outputs.report }}
            ````

            **Actions taken:**
            - New models discovered via OpenRouter are auto-inserted with capabilities mapped from `architecture.modalities` and `supported_parameters`.
            - Disappeared models (or models with `expiration_date` < 1 year) are marked `Deprecated = true`.
            - Existing model `Capabilities` and `ContextLimit` are refreshed from OpenRouter metadata.
            - `Rank` values are auto-computed from OpenRouter data: newer models rank higher, and within the same creation period cheaper output pricing ranks higher.

            **Requires manual review:**
            - Verify `Verified` flags for newly added models.
            - Resolve any validation issues listed above before merging (the PR-level `check-provider-models` job will block the merge otherwise).
          branch: "chore/update-models-${{ matrix.provider }}"
          base: main
          delete-branch: true
          labels: |
            automated

      - name: Assign PR to Milestone
        if: steps.check.outputs.skipped == 'false' && steps.models.outputs.changed == 'true' && steps.create-pr.outputs.pull-request-number != ''
        uses: ./.github/actions/milestone/assign-pr
        with:
          pr-number: ${{ steps.create-pr.outputs.pull-request-number }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch required PR checks
        if: steps.check.outputs.skipped == 'false' && steps.models.outputs.changed == 'true' && steps.create-pr.outputs.pull-request-number != ''
        uses: ./.github/actions/dispatch-required-pr-checks
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: chore/update-models-${{ matrix.provider }}
          pr-number: ${{ steps.create-pr.outputs.pull-request-number }}
          base-ref: main
          pr-title: "chore(models): auto-add new and deprecate stale ${{ matrix.provider }} models"

      - name: Label PR on failure
        if: failure() && steps.create-pr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create-pr.outputs.pull-request-number }},
              labels: ['needs-attention']
            });
