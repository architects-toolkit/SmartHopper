name: 🔄 Update GhJSON Spec Docs

# Related workflows:
#   - chore-update-dev-aitools.yml (DEV.md AI Tools table sync)
#   - chore-update-provider-models.yml (external provider model sync)
#   - chore-update-ghjson-spec-docs.yml (this file)
#
# Description: Keeps the embedded GhJSON/GhPatch specification snapshot in sync with
# the published ghjson-spec repository. The smarthopper_ghjson_reference AI tool uses
# these embedded resources as its offline reference.
#
# Triggers:
#   - schedule: every Sunday 5:00 UTC to catch external spec drift
#   - workflow_dispatch: manual run
#   - pull_request: validate that PRs touching the spec integration keep the snapshot current
#   - push: open an automated PR when the embedded snapshot changes on protected branches

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - dev
      - 'main-*'
      - 'dev-*'
      - 'hotfix/**'
      - 'release/**'
    paths:
      - 'src/SmartHopper.Core.Grasshopper/Resources/GhJsonSpec/**'
      - 'src/SmartHopper.Core.Grasshopper/GhJsonSpec/**/*.cs'
      - 'src/SmartHopper.Core.Grasshopper/AITools/smarthopper_ghjson_reference.cs'
      - 'tools/Sync-GhJsonSpecDocs.ps1'
  push:
    branches:
      - main
      - dev
      - 'main-*'
      - 'dev-*'
      - 'hotfix/**'
      - 'release/**'
    paths:
      - 'src/SmartHopper.Core.Grasshopper/Resources/GhJsonSpec/**'
      - 'src/SmartHopper.Core.Grasshopper/GhJsonSpec/**/*.cs'
      - 'src/SmartHopper.Core.Grasshopper/AITools/smarthopper_ghjson_reference.cs'
      - 'tools/Sync-GhJsonSpecDocs.ps1'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  sync-ghjson-spec-docs:
    name: Sync GhJSON spec docs snapshot
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check for spec doc drift
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File .\tools\Sync-GhJsonSpecDocs.ps1 -Check

      - name: Sync spec docs
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File .\tools\Sync-GhJsonSpecDocs.ps1

      - name: Detect changes
        if: github.event_name != 'pull_request'
        id: detect
        shell: pwsh
        run: |
          $changes = git status --porcelain -- src/SmartHopper.Core.Grasshopper/Resources/GhJsonSpec
          $changed = -not [string]::IsNullOrWhiteSpace($changes)
          if ($changed) {
            "changed=true" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
            Write-Host "Embedded GhJSON spec docs are out of date."
          } else {
            "changed=false" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
            Write-Host "Embedded GhJSON spec docs are up to date."
          }

      - name: Emit step summary
        if: always() && github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $changed = '${{ steps.detect.outputs.changed }}'
          if ($changed -eq 'true') {
            Write-Output "## GhJSON spec docs updated" >> $env:GITHUB_STEP_SUMMARY
            Write-Output "The embedded snapshot in ``src/SmartHopper.Core.Grasshopper/Resources/GhJsonSpec`` was refreshed from the [ghjson-spec](https://github.com/architects-toolkit/ghjson-spec) repository." >> $env:GITHUB_STEP_SUMMARY
          } else {
            Write-Output "## No changes needed" >> $env:GITHUB_STEP_SUMMARY
            Write-Output "The embedded GhJSON spec docs snapshot is already up to date." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Create Pull Request
        if: github.event_name != 'pull_request' && steps.detect.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(spec): sync GhJSON spec docs snapshot [ci skip]"
          title: "chore(spec): sync GhJSON spec docs snapshot"
          body: |
            Auto-generated PR from `.github/workflows/chore-update-ghjson-spec-docs.yml`.

            The embedded GhJSON/GhPatch specification snapshot has been refreshed
            from the published [ghjson-spec](https://github.com/architects-toolkit/ghjson-spec) repository.
          branch: "chore/update-ghjson-spec-docs"
          base: ${{ github.ref_name }}
          delete-branch: true
          labels: |
            automated
            documentation
