name: 🔄 Update Version Badge

# Related workflows (triggered on Solution.props / version changes):
#   - chore-version-date.yml (updates version date suffix on dev/release pushes)
#   - chore-version-badge.yml (updates README badge on version change)
#   - chore-version-main-release.yml (strips date suffix for main release PRs)
#   (dev-update-manifest.yml was removed — manifest text is now resolved at build time via .manifest.json)

# Description: This workflow automatically updates the version badge in the README.md
# when the version in Solution.props changes.
#
# Triggers:
# - Manually via workflow_dispatch
# - Automatically when Solution.props is modified in main or dev branches
#
# Permissions:
# - contents:write - Required to commit changes to README.md
# - pull-requests:write - Required to create PRs with badge updates

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
      - 'hotfix/**'
      - 'release/**'
    # Only run when the version source of truth changes. README.md is an output of this
    # workflow; without this filter every PR merge to main/dev would re-trigger it.
    paths:
      - 'Solution.props'

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  paths-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version_changed: ${{ steps.filter.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            version:
              - Solution.props
  update-badge:
    needs: paths-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      startsWith(github.ref, 'refs/heads/release/') ||
      needs.paths-check.outputs.version_changed == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Update version badge
        id: update-badge
        uses: ./.github/actions/documentation/update-badges
        with:
          branch: ${{ github.ref_name }}

      - name: Check if badges need updating
        id: check-badges
        run: |
          if [[ "${{ steps.update-badge.outputs.badges-changed }}" == "false" ]]; then
            echo "Badges are already up to date. No changes needed."
            echo "::notice::Badges are already up to date with the current version. Workflow execution stopped."
            exit 0
          else
            echo "Badges need to be updated. Continuing workflow."
          fi
        shell: bash

      - name: Check if changes exist
        id: check-changes
        if: steps.update-badge.outputs.badges-changed == 'true'
        run: |
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.update-badge.outputs.badges-changed == 'true' && steps.check-changes.outputs.has_changes == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update version badge for ${{ github.ref_name }}"
          title: "docs: update version badge for ${{ github.ref_name }} to ${{ steps.update-badge.outputs.version }}"
          body: |
            This PR updates the version badge in the README.md to match the current version in Solution.props.

            This is an automated PR created by the Update Version Badge workflow.
          branch: "docs/update-version-badge-${{ github.ref_name }}"
          base: ${{ github.ref_name }}
          delete-branch: true
          labels: |
            documentation
            automated

      - name: Assign PR to Milestone
        if: steps.update-badge.outputs.badges-changed == 'true' && steps.check-changes.outputs.has_changes == 'true' && steps.create-pr.outputs.pull-request-number != ''
        uses: ./.github/actions/milestone/assign-pr
        with:
          pr-number: ${{ steps.create-pr.outputs.pull-request-number }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch required PR checks
        if: steps.update-badge.outputs.badges-changed == 'true' && steps.check-changes.outputs.has_changes == 'true' && steps.create-pr.outputs.pull-request-number != ''
        uses: ./.github/actions/dispatch-required-pr-checks
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: docs/update-version-badge-${{ github.ref_name }}
          pr-number: ${{ steps.create-pr.outputs.pull-request-number }}
          base-ref: ${{ github.ref_name }}
          pr-title: "docs: update version badge for ${{ github.ref_name }} to ${{ steps.update-badge.outputs.version }}"

      - name: Label PR on failure
        if: failure() && steps.create-pr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create-pr.outputs.pull-request-number }},
              labels: ['status: needs-attention']
            });
