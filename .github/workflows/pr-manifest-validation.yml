name: 📋 PR - Validate Manifest Text

# Related workflows (PR validation suite):
#   - pr-validation.yml (version, code style, changelog, title checks)
#   - pr-license-headers.yml (license header compliance)
#   - pr-build-hash-validation.yml (build hash integrity)
#   - pr-version-validation.yml (version consistency)
#   - pr-dependency-validation.yml (dependency checks)
#   - pr-manifest-validation.yml (manifest consistency)
#   - ci-dotnet-tests.yml (.NET build and test)

# Description: This workflow validates that the manifest text in manifest.yml
# matches the version type (dev/alpha/beta/rc/stable) based on the version in
# Solution.props. If manifest.yml uses the {{NOTE_TEXT}} placeholder, the check
# passes because the placeholder is resolved at build time by release-6-upload-yak.yml.
# It blocks PRs to main if the manifest text doesn't match the version type.
#
# Triggers:
# - Automatically when a PR to main modifies manifest.yml or Solution.props
#
# Permissions:
# - contents:read - Required to read repository content

on:
  pull_request:
    branches:
      - main
      - 'main-*'
    paths:
      - 'yak-package/manifest.yml'
      - 'yak-package/.manifest.json'
      - 'Solution.props'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-manifest:
    name: 📋 Validate Manifest Text Matches Version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from Solution.props
        id: version
        uses: ./.github/actions/versioning/get-version

      - name: Determine expected manifest text
        id: expected
        uses: ./.github/actions/versioning/update-manifest-text
        with:
          version: ${{ steps.version.outputs.version }}

      - name: Write expected text to file
        run: |
          echo "${{ steps.expected.outputs.manifest-text }}" > expected.txt
          echo "release_type=${{ steps.expected.outputs.release-type }}" >> $GITHUB_OUTPUT
          echo "Expected release type: ${{ steps.expected.outputs.release-type }}"

      - name: Check manifest text
        id: check
        run: |
          # If manifest uses {{NOTE_TEXT}} placeholder, it will be resolved at
          # build time by release-6-upload-yak.yml via the update-manifest-text action.
          if grep -q '{{NOTE_TEXT}}' yak-package/manifest.yml; then
            echo "Manifest uses {{NOTE_TEXT}} placeholder (resolved at build time)"
            echo "match=true" >> $GITHUB_OUTPUT
          else
            # Extract the note/description section between the description block markers
            ACTUAL=$(sed -n '/----/,/----/p' yak-package/manifest.yml | \
              grep -v -e '----' | \
              grep -v '^$' | \
              sed 's/^  //' | \
              tr '\n' ' ' | \
              sed 's/  */ /g' | \
              sed 's/^ *//;s/ *$//')
            EXPECTED=$(cat expected.txt)

            echo "Expected text: $EXPECTED"
            echo "Actual text: $ACTUAL"

            if [ "$EXPECTED" = "$ACTUAL" ]; then
              echo "Manifest text matches version type: ${{ steps.expected.outputs.release-type }}"
              echo "match=true" >> $GITHUB_OUTPUT
            else
              echo "Manifest text does not match version type: ${{ steps.expected.outputs.release-type }}"
              echo "match=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Fail if manifest text doesn't match
        if: steps.check.outputs.match == 'false'
        run: |
          echo "::error::Manifest text does not match the version type!"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Expected type: ${{ steps.expected.outputs.release-type }}"
          echo "Expected text:"
          cat expected.txt
          echo "Actual text found in manifest.yml does not match."
          echo "Either use the {{NOTE_TEXT}} placeholder or set the correct text."
          exit 1
