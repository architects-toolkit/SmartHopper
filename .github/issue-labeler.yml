# Issue auto-labeling configuration for github/issue-labeler@v3
# Maps issue title/body regex patterns to labels.

"provider: OpenAI":
  - '(?i)\bOpenAI\b'
"provider: MistralAI":
  - '(?i)\bMistral\b'
"provider: Anthropic":
  - '(?i)\bAnthropic\b|\bClaude\b'
"provider: DeepSeek":
  - '(?i)\bDeepSeek\b'
"provider: OpenRouter":
  - '(?i)\bOpenRouter\b'
"provider: Gemini":
  - '(?i)\bGemini\b'

"scope: Mcp":
  - '(?i)\bMCP\b|\bMcpServer\b|\bSmartHopperMcpServer\b'

"os: Windows":
  - '(?i)\bWindows\b'
"os: MacOS":
  - '(?i)\bmacOS\b|\bMac OS\b'
