# Issue auto-labeling configuration for github/issue-labeler@v3
# Maps issue title/body regex patterns to labels.

"provider: OpenAI":
  - '/\bOpenAI\b/i'
"provider: MistralAI":
  - '/\bMistral\b/i'
"provider: Anthropic":
  - '/\bAnthropic\b|\bClaude\b/i'
"provider: DeepSeek":
  - '/\bDeepSeek\b/i'
"provider: OpenRouter":
  - '/\bOpenRouter\b/i'
"provider: Gemini":
  - '/\bGemini\b/i'

"scope: Mcp":
  - '/\bMCP\b|\bMcpServer\b|\bSmartHopperMcpServer\b/i'

"os: Windows":
  - '/\bWindows\b/i'
"os: MacOS":
  - '/\bmacOS\b|\bMac OS\b/i'
