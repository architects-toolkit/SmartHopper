# ──────────────────────────────────────────────────────────────
# Label Color Guide
# ──────────────────────────────────────────────────────────────
#
# Category            Hex       Purpose
# ─────────────────── ───────── ─────────────────────────────────
# scope:              000000    Internal code area (black)
# scope: Security     500       Security-sensitive (dark red)
# component:          1B2638    Grasshopper component (dark navy)
# provider:           1A3636    AI provider (dark teal)
# os:                 2B3A52    Platform tag (dark slate)
# close:              808080    Closure reason (gray)
# automated / ci      BFD4DB    CI/CD generated (silver-blue)
# model-verification  2EA44F    CI workflow (green)
# documentation       0075CA    Docs (blue)
# has-conflicts       E4E669    Merge warning (yellow)
# priority: critical  B60205    Urgency gradient — red
# priority: high      D93F0B    Urgency gradient — dark orange
# priority: medium    E4A511    Urgency gradient — amber
# priority: low       0075CA    Urgency gradient — blue
# status: blocked     D92D20    Workflow state — rose red
# status: in progress FBCA04    Workflow state — gold
# status: needs triage 0E8A16   Workflow state — green
# status: needs more  A855F7    Workflow state — orchid
# status: help wanted 14B8A6    Workflow state — teal
# status: needs attention FF6723  Workflow state — orange-red
# status: stale       CFD3D7    Workflow state — light gray
# status: needs testr D946EF    Workflow state — magenta (NEW)
# promotion: blocked  E11D48    Release pipeline — crimson
# promotion: freeze   F97316    Release pipeline — orange
# version:            FFFFFF    Version tracking (white)
# ──────────────────────────────────────────────────────────────

# automated Labels
- name: "automated"
  color: "BFD4DB"
  description: "Automatically generated by CI/CD workflows"

# ci Labels
- name: "ci"
  color: "BFD4DB"
