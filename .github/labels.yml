# ──────────────────────────────────────────────────────────────
# Label Color Guide
# ──────────────────────────────────────────────────────────────
#
# Category            Hex       Purpose
# ─────────────────── ───────── ─────────────────────────────────
# scope:              000000    Internal code area (black)
# scope: Security     500       Security-sensitive (dark red)
# component:          1B2638    Grasshopper component (dark navy)
# provider:           1A3636    AI provider (dark teal)
# os:                 2B3A52    Platform tag (dark slate)
# close:              808080    Closure reason (gray)
# automated / ci      BFD4DB    CI/CD generated (silver-blue)
# model-verification  2EA44F    CI workflow (green)
# documentation       0075CA    Docs (blue)
# has-conflicts       E4E669    Merge warning (yellow)
# priority: critical  B60205    Urgency gradient — red
# priority: high      D93F0B    Urgency gradient — dark orange
# priority: medium    E4A511    Urgency gradient — amber
# priority: low       0075CA    Urgency gradient — blue
# status: blocked     D92D20    Workflow state — rose red
# status: in progress FBCA04    Workflow state — gold
# status: needs triage 0E8A16   Workflow state — green
# status: needs more  A855F7    Workflow state — orchid
# status: help wanted 14B8A6    Workflow state — teal
# status: needs-attn  FF6723    Workflow state — orange-red
# status: stale       CFD3D7    Workflow state — light gray
# status: needs testr D946EF    Workflow state — magenta (NEW)
# promotion: blocked  E11D48    Release pipeline — crimson
# promotion: freeze   F97316    Release pipeline — orange
# version:            FFFFFF    Version tracking (white)
# ──────────────────────────────────────────────────────────────

# Automation Labels
- name: "automated"
  color: "BFD4DB"
  description: "Automatically generated by CI/CD workflows"
- name: "ci"
  color: "BFD4DB"
  description: "Changes to CI/CD workflows or actions"
- name: "model-verification"
  color: "2EA44F"
  description: "Model verification workflow"
- name: "documentation"
  color: "0075CA"
  description: "Documentation changes"
- name: "has-conflicts"
  color: "E4E669"
  description: "Cherry-pick had merge conflicts"

# Type: Priority
- name: "priority: critical"
  color: "B60205"
  description: "Critical priority issue that needs immediate attention"
- name: "priority: high"
  color: "D93F0B"
  description: "High priority issue that should be addressed soon"
- name: "priority: medium"
  color: "E4A511"
  description: "Medium priority issue"
- name: "priority: low"
  color: "0075CA"
  description: "Low priority issue"

# Close Labels
- name: "close: duplicate"
  color: "808080"
  description: "This issue already exists"
- name: "close: not related"
  color: "808080"
  description: "This issue is not related to the SmartHopper plugin"
- name: "close: lack of details"
  color: "808080"
  description: "This issue is missing details"
- name: "close: help not found"
  color: "808080"
  description: "This issue is missing help"

# Status Labels
- name: "status: in progress"
  color: "FBCA04"
  description: "Issue is currently being worked on"
- name: "status: blocked"
  color: "D92D20"
  description: "Issue is blocked by other work"
- name: "status: needs more details"
  color: "A855F7"
  description: "Requires more details to proceed"
- name: "status: needs triage"
  color: "0E8A16"
  description: "Ready for triage"
- name: "status: help wanted"
  color: "14B8A6"
  description: "Help wanted"
- name: "status: needs-attention"
  color: "FF6723"
  description: "Requires manual review or intervention"
- name: "status: stale"
  color: "CFD3D7"
  description: "Issue or PR has been inactive and may be closed soon"
- name: "status: needs testers"
  color: "D946EF"
  description: "Needs community testers to validate"

# Promotion Labels
- name: "promotion: blocked"
  color: "E11D48"
  description: "Promotion is blocked and requires manual intervention"
- name: "promotion: freeze"
  color: "F97316"
  description: "Pauses automatic promotion for a version"

