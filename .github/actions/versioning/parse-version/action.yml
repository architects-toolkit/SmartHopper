name: 'Parse Version'
description: 'Parse semantic version string into components (major, minor, patch, suffix, stage)'
inputs:
  version:
    description: 'Version string to parse (e.g., 1.4.3 or 1.4.3-alpha.240101)'
    required: true

outputs:
  major:
    description: 'Major version component'
    value: ${{ steps.parse.outputs.major }}
  minor:
    description: 'Minor version component'
    value: ${{ steps.parse.outputs.minor }}
  patch:
    description: 'Patch version component'
    value: ${{ steps.parse.outputs.patch }}
  suffix:
    description: 'Full suffix including stage and date (e.g., alpha.240101)'
    value: ${{ steps.parse.outputs.suffix }}
  stage:
    description: 'Release stage extracted from suffix (alpha, beta, rc, or stable)'
    value: ${{ steps.parse.outputs.stage }}
  is-prerelease:
    description: 'Whether this is a pre-release version'
    value: ${{ steps.parse.outputs.is-prerelease }}

runs:
  using: "composite"
  steps:
    - name: Parse version
      id: parse
      shell: pwsh
      run: |
        $version = "${{ inputs.version }}"
        
        # Parse semantic version: X.Y.Z or X.Y.Z-SUFFIX
        if ($version -match '^(\d+)\.(\d+)\.(\d+)(?:-([a-zA-Z0-9.]+))?$') {
          $major = $Matches[1]
          $minor = $Matches[2]
          $patch = $Matches[3]
          $suffix = $Matches[4]
          
          # Extract stage from suffix (e.g., 'alpha' from 'alpha.240101')
          $stage = if ($suffix) { $suffix.Split('.')[0].ToLower() } else { 'stable' }
          $isPrerelease = if ($suffix) { 'true' } else { 'false' }
          
          Write-Host "Parsed version: $version"
          Write-Host "  Major: $major"
          Write-Host "  Minor: $minor"
          Write-Host "  Patch: $patch"
          Write-Host "  Suffix: $suffix"
          Write-Host "  Stage: $stage"
          Write-Host "  Is Pre-release: $isPrerelease"
          
          "major=$major" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8
          "minor=$minor" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8
          "patch=$patch" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8
          "suffix=$suffix" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8
          "stage=$stage" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8
          "is-prerelease=$isPrerelease" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8
        } else {
          Write-Error "Invalid version format: $version (expected X.Y.Z or X.Y.Z-SUFFIX)"
          exit 1
        }
