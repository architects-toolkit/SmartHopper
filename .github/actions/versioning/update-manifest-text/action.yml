name: 'Update Manifest Text'
description: 'Determines and optionally updates manifest.yml note text based on version type, reading text from yak-package/.manifest.json'

inputs:
  version:
    description: 'Version string to determine manifest text from'
    required: true
  manifest-path:
    description: 'Path to manifest.yml file (relative to workspace)'
    required: false
    default: 'yak-package/manifest.yml'
  notes-path:
    description: 'Path to .manifest.json file containing note texts (relative to workspace)'
    required: false
    default: 'yak-package/.manifest.json'
  update-file:
    description: 'Whether to actually update the manifest file (true) or just output the text (false)'
    required: false
    default: 'false'

outputs:
  release-type:
    description: 'Detected release type (dev, alpha, beta, rc, stable)'
    value: ${{ steps.determine.outputs.type }}
  manifest-text:
    description: 'The manifest text that should be used'
    value: ${{ steps.determine.outputs.text }}
  file-updated:
    description: 'Whether the manifest file was actually modified'
    value: ${{ steps.update.outputs.updated || 'false' }}

runs:
  using: "composite"
  steps:
    - name: Determine manifest text from version
      id: determine
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        NOTES_PATH="${{ inputs.notes-path }}"

        # Determine release type from version suffix
        if [[ "$VERSION" =~ -dev ]]; then
          TYPE="dev"
        elif [[ "$VERSION" =~ -alpha ]]; then
          TYPE="alpha"
        elif [[ "$VERSION" =~ -beta ]]; then
          TYPE="beta"
        elif [[ "$VERSION" =~ -rc ]]; then
          TYPE="rc"
        else
          TYPE="stable"
        fi

        # Read note text from .manifest.json
        if [ ! -f "$NOTES_PATH" ]; then
          echo "::error::Notes file not found at $NOTES_PATH"
          exit 1
        fi

        TEXT=$(jq -r --arg type "$TYPE" '.notes[$type] // empty' "$NOTES_PATH")
        if [ -z "$TEXT" ]; then
          echo "::error::No note text found for release type '$TYPE' in $NOTES_PATH"
          exit 1
        fi

        echo "type=$TYPE" >> $GITHUB_OUTPUT
        echo "text=$TEXT" >> $GITHUB_OUTPUT
        echo "Release type: $TYPE"
        echo "Manifest text: $TEXT"

    - name: Update manifest file (if enabled)
      id: update
      if: inputs.update-file == 'true'
      shell: bash
      run: |
        MANIFEST_PATH="${{ inputs.manifest-path }}"
        TEXT="${{ steps.determine.outputs.text }}"
        TYPE="${{ steps.determine.outputs.type }}"

        # Check if manifest exists
        if [ ! -f "$MANIFEST_PATH" ]; then
          echo "::warning::Manifest file not found at $MANIFEST_PATH"
          echo "updated=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Create a backup before modification to detect no-ops
        cp "$MANIFEST_PATH" "$MANIFEST_PATH.bak"

        # Replace {{NOTE_TEXT}} placeholder with the resolved note text
        if grep -q '{{NOTE_TEXT}}' "$MANIFEST_PATH"; then
          echo "Replacing {{NOTE_TEXT}} placeholder with $TYPE text"
          ESCAPED_TEXT=$(echo "$TEXT" | sed 's/[&/\]/\\&/g')
          sed -i "s|{{NOTE_TEXT}}|$ESCAPED_TEXT|" "$MANIFEST_PATH"
        else
          echo "::warning::Could not find {{NOTE_TEXT}} placeholder in $MANIFEST_PATH"
          echo "Current content around description:"
          grep -A 10 "description:" "$MANIFEST_PATH" || true
          echo "updated=false" >> $GITHUB_OUTPUT
          rm -f "$MANIFEST_PATH.bak"
          exit 0
        fi

        # Only report updated if the file content actually changed
        if ! cmp -s "$MANIFEST_PATH.bak" "$MANIFEST_PATH"; then
          echo "updated=true" >> $GITHUB_OUTPUT
          echo "Manifest successfully updated"
        else
          echo "No actual changes made (text already matches)"
          echo "updated=false" >> $GITHUB_OUTPUT
        fi

        rm -f "$MANIFEST_PATH.bak"
