name: Manage Release Milestones
description: Creates next-stage milestones and manages active milestones for release versions

inputs:
  released-version:
    description: 'The released version tag (e.g., 1.4.3-alpha)'
    required: true
  token:
    description: 'GitHub token for API access'
    required: true

outputs:
  created-milestones:
    description: 'JSON array of created milestone titles'
    value: ${{ steps.manage.outputs.created-milestones }}
  closed-milestones:
    description: 'JSON array of closed milestone titles'
    value: ${{ steps.manage.outputs.closed-milestones }}

runs:
  using: composite
  steps:
    - name: Manage milestones for released version
      id: manage
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.token }}
        script: |
          // Parse semantic version from string
          function parseVersion(versionStr) {
            const match = versionStr.match(/^(\d+)\.(\d+)\.(\d+)(?:-(.+))?$/);
            if (!match) return null;
            
            return {
              major: parseInt(match[1]),
              minor: parseInt(match[2]),
              patch: parseInt(match[3]),
              suffix: match[4] || 'stable',
              original: versionStr
            };
          }
          
          // Format version object back to string
          function formatVersion(version) {
            let versionStr = `${version.major}.${version.minor}.${version.patch}`;
            if (version.suffix && version.suffix !== 'stable') {
              versionStr += `-${version.suffix}`;
            }
            return versionStr;
          }
          
          // Create a milestone
          async function createMilestone(title, description) {
            try {
              const response = await github.rest.issues.createMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                description: description || `Auto-created milestone for ${title}`
              });
              console.log(`✅ Created milestone: ${title}`);
              return { title, created: true };
            } catch (error) {
              if (error.message.includes('already exists')) {
                console.log(`ℹ️ Milestone ${title} already exists`);
                return { title, created: false };
              }
              throw error;
            }
          }
          
          // Close older milestones of the same suffix within the same major version
          async function closeOlderMilestones(suffix, majorVersion) {
            const { data: allMilestones } = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            // Filter for same suffix AND same major version
            const sameSuffixMilestones = allMilestones.filter(m => {
              const mParsed = parseVersion(m.title);
              return mParsed && mParsed.suffix === suffix && mParsed.major === majorVersion;
            });
            
            sameSuffixMilestones.sort((a, b) => {
              const aParsed = parseVersion(a.title);
              const bParsed = parseVersion(b.title);
              
              if (aParsed.minor !== bParsed.minor) return bParsed.minor - aParsed.minor;
              return bParsed.patch - aParsed.patch;
            });
            
            const closedTitles = [];
            for (let i = 1; i < sameSuffixMilestones.length; i++) {
              const oldMilestone = sameSuffixMilestones[i];
              console.log(`Closing older ${suffix} milestone (major ${majorVersion}): ${oldMilestone.title}`);
              
              await github.rest.issues.updateMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                milestone_number: oldMilestone.number,
                state: 'closed'
              });
              closedTitles.push(oldMilestone.title);
            }
            return closedTitles;
          }
          
          const releasedVersion = '${{ inputs.released-version }}';
          console.log(`Processing released version: ${releasedVersion}`);
          
          const parsed = parseVersion(releasedVersion);
          if (!parsed) {
            console.log('Release tag is not a valid semantic version, skipping.');
            core.setOutput('created-milestones', JSON.stringify([]));
            core.setOutput('closed-milestones', JSON.stringify([]));
            return;
          }
          
          const createdMilestones = [];
          const closedMilestones = [];
          
          // Alpha releases create two milestones: beta and next minor alpha
          if (parsed.suffix === 'alpha') {
            // Create beta milestone
            const betaVersion = {
              major: parsed.major,
              minor: parsed.minor,
              patch: parsed.patch,
              suffix: 'beta'
            };
            const betaVersionStr = formatVersion(betaVersion);
            const betaResult = await createMilestone(betaVersionStr, `Auto-created milestone for ${betaVersionStr} (stability path from ${releasedVersion})`);
            if (betaResult.created) createdMilestones.push(betaVersionStr);
            
            // Close older beta milestones within same major version
            const closedBetas = await closeOlderMilestones('beta', parsed.major);
            closedMilestones.push(...closedBetas);
            
            // Create next minor alpha milestone
            const nextMinorAlpha = {
              major: parsed.major,
              minor: parsed.minor + 1,
              patch: 0,
              suffix: 'alpha'
            };
            const nextMinorAlphaStr = formatVersion(nextMinorAlpha);
            const nextAlphaResult = await createMilestone(nextMinorAlphaStr, `Auto-created next minor alpha (from ${releasedVersion})`);
            if (nextAlphaResult.created) createdMilestones.push(nextMinorAlphaStr);
          }
          // Beta releases create rc milestone
          else if (parsed.suffix === 'beta') {
            const rcVersion = {
              major: parsed.major,
              minor: parsed.minor,
              patch: parsed.patch,
              suffix: 'rc'
            };
            const rcVersionStr = formatVersion(rcVersion);
            const rcResult = await createMilestone(rcVersionStr, `Auto-created milestone for ${rcVersionStr} (stability path from ${releasedVersion})`);
            if (rcResult.created) createdMilestones.push(rcVersionStr);
            
            // Close older rc milestones within same major version
            const closedRcs = await closeOlderMilestones('rc', parsed.major);
            closedMilestones.push(...closedRcs);
          }
          // RC releases create stable milestone
          else if (parsed.suffix === 'rc') {
            const stableVersion = {
              major: parsed.major,
              minor: parsed.minor,
              patch: parsed.patch,
              suffix: null
            };
            const stableVersionStr = formatVersion(stableVersion);
            const stableResult = await createMilestone(stableVersionStr, `Auto-created milestone for ${stableVersionStr} (stability path from ${releasedVersion})`);
            if (stableResult.created) createdMilestones.push(stableVersionStr);
            
            // Close older stable milestones within same major version
            const closedStables = await closeOlderMilestones('stable', parsed.major);
            closedMilestones.push(...closedStables);
          }
          
          console.log(`Created milestones: ${JSON.stringify(createdMilestones)}`);
          console.log(`Closed milestones: ${JSON.stringify(closedMilestones)}`);
          
          core.setOutput('created-milestones', JSON.stringify(createdMilestones));
          core.setOutput('closed-milestones', JSON.stringify(closedMilestones));
