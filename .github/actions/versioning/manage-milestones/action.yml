name: Manage Release Milestones
description: Creates next-stage milestones for release versions

inputs:
  released-version:
    description: 'The released version tag (e.g., 1.4.3-alpha)'
    required: true
  token:
    description: 'GitHub token for API access'
    required: true

outputs:
  created-milestones:
    description: 'JSON array of created milestone titles'
    value: ${{ steps.manage.outputs.created-milestones }}

runs:
  using: composite
  steps:
    - name: Manage milestones for released version
      id: manage
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.token }}
        script: |
          // ===== SHARED VERSION UTILITIES (used across versioning actions) =====
          // Parse semantic version from string
          function parseVersion(versionStr) {
            const match = versionStr.match(/^(\d+)\.(\d+)\.(\d+)(?:-(.+))?$/);
            if (!match) return null;
            
            return {
              major: parseInt(match[1]),
              minor: parseInt(match[2]),
              patch: parseInt(match[3]),
              suffix: match[4] || null,
              original: versionStr
            };
          }
          
          // Format version object back to string
          function formatVersion(version) {
            let versionStr = `${version.major}.${version.minor}.${version.patch}`;
            if (version.suffix) {
              versionStr += `-${version.suffix}`;
            }
            return versionStr;
          }
          // ===== END SHARED VERSION UTILITIES =====
          
          // Create a milestone
          async function createMilestone(title, description) {
            try {
              const response = await github.rest.issues.createMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                description: description || `Auto-created milestone for ${title}`
              });
              console.log(`✅ Created milestone: ${title}`);
              return { title, created: true };
            } catch (error) {
              // GitHub returns 422 with error code "already_exists" when a milestone
              // with the same title already exists. Older Octokit versions surfaced
              // this as "already exists" in the message — handle both forms.
              const msg = error.message || '';
              if (error.status === 422 && /already[_ ]exists/.test(msg)) {
                console.log(`ℹ️ Milestone ${title} already exists`);
                return { title, created: false };
              }
              throw error;
            }
          }
          
          // Extract stage from suffix (e.g., 'alpha' from 'alpha.240101')
          function getStage(suffix) {
            if (!suffix || suffix === 'stable') return 'stable';
            return suffix.split('.')[0].toLowerCase();
          }
          
          const releasedVersion = '${{ inputs.released-version }}';
          console.log(`Processing released version: ${releasedVersion}`);
          
          const parsed = parseVersion(releasedVersion);
          if (!parsed) {
            console.log('Release tag is not a valid semantic version, skipping.');
            core.setOutput('created-milestones', JSON.stringify([]));
            return;
          }
          
          const createdMilestones = [];
          
          // Extract stage from suffix
          const stage = getStage(parsed.suffix);
          
          // Alpha releases create two milestones: beta and next minor alpha
          if (stage === 'alpha') {
            // Create beta milestone
            const betaVersion = {
              major: parsed.major,
              minor: parsed.minor,
              patch: parsed.patch,
              suffix: 'beta'
            };
            const betaVersionStr = formatVersion(betaVersion);
            const betaResult = await createMilestone(betaVersionStr, `Auto-created milestone for ${betaVersionStr} (stability path from ${releasedVersion})`);
            if (betaResult.created) createdMilestones.push(betaVersionStr);
            
            // Create next minor alpha milestone
            const nextMinorAlpha = {
              major: parsed.major,
              minor: parsed.minor + 1,
              patch: 0,
              suffix: 'alpha'
            };
            const nextMinorAlphaStr = formatVersion(nextMinorAlpha);
            const nextAlphaResult = await createMilestone(nextMinorAlphaStr, `Auto-created next minor alpha (from ${releasedVersion})`);
            if (nextAlphaResult.created) createdMilestones.push(nextMinorAlphaStr);
          }
          // Beta releases create rc milestone
          else if (stage === 'beta') {
            const rcVersion = {
              major: parsed.major,
              minor: parsed.minor,
              patch: parsed.patch,
              suffix: 'rc'
            };
            const rcVersionStr = formatVersion(rcVersion);
            const rcResult = await createMilestone(rcVersionStr, `Auto-created milestone for ${rcVersionStr} (stability path from ${releasedVersion})`);
            if (rcResult.created) createdMilestones.push(rcVersionStr);
          }
          // RC releases create stable milestone
          else if (stage === 'rc') {
            const stableVersion = {
              major: parsed.major,
              minor: parsed.minor,
              patch: parsed.patch,
              suffix: null
            };
            const stableVersionStr = formatVersion(stableVersion);
            const stableResult = await createMilestone(stableVersionStr, `Auto-created milestone for ${stableVersionStr} (stability path from ${releasedVersion})`);
            if (stableResult.created) createdMilestones.push(stableVersionStr);
          }
          
          console.log(`Created milestones: ${JSON.stringify(createdMilestones)}`);
          
          core.setOutput('created-milestones', JSON.stringify(createdMilestones));
