name: Dispatch required PR checks
description: Dispatches the protected-branch PR check workflows for the current PR branch.

inputs:
  token:
    description: GitHub token with actions:write permission.
    required: true
  ref:
    description: Branch or ref to run the checks against.
    required: true
  pr-number:
    description: Pull request number.
    required: false
    default: ''
  base-ref:
    description: Pull request base branch.
    required: false
    default: ''
  pr-title:
    description: Pull request title.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Dispatch workflows
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REF: ${{ inputs.ref }}
        PR_NUMBER: ${{ inputs.pr-number }}
        BASE_REF: ${{ inputs.base-ref }}
        PR_TITLE: ${{ inputs.pr-title }}
      run: |
        set -uo pipefail

        workflows=(
          "check-provider-models.yml"
          "pr-license-headers.yml"
          "pr-validation.yml"
          "pr-build-hash-validation.yml"
          "pr-version-validation.yml"
          "ci-dotnet-tests.yml"
        )

        failed=0

        for workflow in "${workflows[@]}"; do
          if [[ ! -f ".github/workflows/$workflow" ]]; then
            echo "Skipping $workflow because it is not present on $REF"
            continue
          fi

          args=(workflow run "$workflow" --ref "$REF")
          if [[ -n "$PR_NUMBER" ]]; then
            args+=(-f "pr_number=$PR_NUMBER")
          fi
          if [[ -n "$BASE_REF" ]]; then
            args+=(-f "base_ref=$BASE_REF")
          fi
          if [[ -n "$PR_TITLE" ]]; then
            args+=(-f "pr_title=$PR_TITLE")
          fi

          echo "Dispatching $workflow for $REF"

          # Retry up to 3 times with backoff to handle transient 422 errors
          # (GitHub may not have re-indexed workflow files immediately after a push)
          dispatched=false
          for attempt in 1 2 3; do
            if gh "${args[@]}" 2>/tmp/gh_err; then
              dispatched=true
              break
            fi
            err=$(cat /tmp/gh_err)
            echo "  Attempt $attempt failed: $err"
            if [[ $attempt -lt 3 ]]; then
              echo "  Retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
            fi
          done

          if [[ "$dispatched" != "true" ]]; then
            echo "::warning::Failed to dispatch $workflow after 3 attempts"
            failed=$((failed + 1))
          fi
        done

        if [[ $failed -gt 0 ]]; then
          echo "::warning::$failed workflow(s) failed to dispatch"
        fi
